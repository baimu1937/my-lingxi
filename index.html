<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀 v32.8 - 视觉焕新版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --bg-main: #f8fafc; --bg-sidebar: #1e222d; --accent-blue: #3b82f6; }
        .theme-dark { --bg-main: #0f172a; }
        .theme-eye { --bg-main: #f0fdf4; }
        .theme-retro { --bg-main: #fdf6e3; }
        body { background-color: var(--bg-main); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; transition: all 0.3s ease; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.4); }
        .sidebar { width: 280px; background: var(--bg-sidebar); color: white; z-index: 50; }
        
        .mode-btn { flex: 1; padding-top: 0.75rem; padding-bottom: 0.75rem; font-size: 15px !important; font-weight: 900; font-style: italic; transition: all 0.3s; border-radius: 10px; }
        .mode-btn-active { background: #3b82f6; color: white; box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        
        .msg-wrapper { margin-bottom: 2rem; display: flex; flex-direction: column; }
        .user-msg { background: var(--accent-blue); color: white; padding: 1.2rem 1.5rem; border-radius: 20px 20px 4px 20px; align-self: flex-end; max-width: 80%; line-height: 1.8; box-shadow: 0 4px 15px rgba(59,130,246,0.15); }
        .ai-msg { background: white; color: #334155; padding: 1.5rem 2rem; border-radius: 20px 20px 20px 4px; border: 1px solid #e2e8f0; align-self: flex-start; max-width: 90%; line-height: 1.8; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .theme-dark .ai-msg { background: #1e293b; color: #e2e8f0; border-color: #334155; }
        
        #themeMenu { display: none; position: absolute; right: 40px; top: 60px; background: white; border-radius: 12px; padding: 10px; z-index: 100; border: 1px solid #eee; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-direction: row; gap: 0.75rem; }
        .theme-dot { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; transition: transform 0.2s; }
        .theme-dot:hover { transform: scale(1.1); }
        
        .editor-container { flex: 1; display: none; background: white; border-right: 1px solid #e2e8f0; }
        .theme-dark .editor-container { background: #0f172a; border-right-color: #334155; }
        .editor-active { display: flex !important; }
        .writing-area { width: 100%; height: 100%; padding: 40px; font-size: 16px; line-height: 2; outline: none; border: none; background: transparent; color: inherit; }
        
        #tempValueDisplay { font-family: monospace; font-weight: 900; color: #3b82f6; font-size: 14px; min-width: 25px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="sidebar flex flex-col shadow-2xl">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-3xl font-black text-blue-400 italic tracking-wider">灵犀</h1>
            <p id="slogan" class="text-[12px] text-blue-300/60 italic mt-2 tracking-widest">妙笔千般意 灵犀一点通</p>
        </div>
        
        <div class="flex-1 overflow-y-auto custom-scroll p-6 space-y-8">
            <div class="flex bg-black/20 p-1.5 rounded-xl border border-white/5">
                <button id="modeChat" class="mode-btn mode-btn-active">创作</button>
                <button id="modePK" class="mode-btn text-gray-400 hover:text-gray-200">竞技擂台</button>
            </div>

            <section class="mb-4">
                <button id="openPromptModalBtn" class="w-full bg-gradient-to-r from-blue-600/10 to-blue-400/10 hover:from-blue-600 hover:to-blue-500 border border-blue-500/20 hover:border-blue-400 text-blue-300 hover:text-white py-4 rounded-xl font-black transition-all duration-300 shadow-sm flex items-center justify-center gap-3 group">
                    <span class="text-lg">🗡️ 神兵武库</span>
                    <span id="promptCountBadge" class="bg-blue-500/30 group-hover:bg-white/20 px-2.5 py-1 rounded-md text-[11px]">0件</span>
                </button>
            </section>

            <!-- 新增：书稿管理 -->
            <section class="mb-4">
                <div class="flex justify-between items-center mb-3 px-1">
                    <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest">📖 书稿管理</span>
                    <button onclick="addNewBook()" class="text-blue-400 text-[11px] font-bold hover:text-blue-300 transition px-2 py-1 bg-blue-500/10 rounded hover:bg-blue-500/20">+ 新建</button>
                </div>
                <div id="bookLibrary" class="space-y-2"></div>
            </section>

            <section class="pb-10">
                <div class="flex justify-between items-center mb-3 px-1">
                    <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest">📖 例文克隆中心</span>
                    <button onclick="document.getElementById('fileInput').click()" class="text-blue-400 text-[11px] font-bold hover:text-blue-300 transition px-2 py-1 bg-blue-500/10 rounded hover:bg-blue-500/20">+ 导入</button>
                </div>
                <input type="file" id="fileInput" class="hidden" multiple accept=".txt,.docx">
                <div id="sampleLibrary" class="space-y-2"></div>
            </section>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden bg-transparent">
        <header class="h-[72px] bg-white/80 backdrop-blur-md border-b border-gray-200 flex items-center px-8 justify-between z-10 transition-colors theme-dark:bg-[#1e293b]/80 theme-dark:border-[#334155]">
            <div class="flex items-center gap-3">
                <div class="w-1 h-5 bg-blue-500 rounded-full"></div>
                <h2 id="workTitle" class="text-base font-bold text-gray-700 italic mr-4 theme-dark:text-gray-200">灵犀创作</h2>
                
                <button id="toggleSpace" class="text-gray-500 hover:text-blue-600 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 theme-dark:hover:bg-gray-800">
                    <span>✍️</span> 分屏创作
                </button>
                <button id="newChatBtn" class="text-gray-500 hover:text-blue-600 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 theme-dark:hover:bg-gray-800">
                    <span>✨</span> 新开篇
                </button>
                <button id="typesetBtn" class="text-gray-500 hover:text-blue-600 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 theme-dark:hover:bg-gray-800">
                    <span>📝</span> 一键排版
                </button>
                
                <div class="w-px h-4 bg-gray-200 mx-2 theme-dark:bg-gray-700"></div>
                
                <button onclick="document.getElementById('importSystemInput').click()" class="text-gray-500 hover:text-blue-600 hover:bg-gray-50 font-bold text-sm px-4 py-2 rounded-lg transition-all flex items-center gap-2 theme-dark:hover:bg-gray-800" title="导入神兵档案 JSON">
                    <span>📂</span> 导入
                </button>
                <button id="exportSystemBtn" class="text-gray-500 hover:text-blue-600 hover:bg-gray-50 font-bold text-sm px-4 py-2 rounded-lg transition-all flex items-center gap-2 theme-dark:hover:bg-gray-800" title="导出全量备份 JSON">
                    <span>💾</span> 导出
                </button>
                <input type="file" id="importSystemInput" class="hidden" accept=".json">
            </div>
            
            <div class="flex items-center gap-6 relative">
                <div class="flex items-center gap-3 bg-gray-50/80 px-4 py-1.5 rounded-full border border-gray-200 theme-dark:bg-gray-800 theme-dark:border-gray-700">
                    <span class="text-[11px] font-black text-gray-400">灵感</span>
                    <input type="range" id="tempSlider" min="0" max="1.5" step="0.1" value="0.7" class="w-16 h-1 accent-blue-500 cursor-pointer">
                    <span id="tempValueDisplay" class="text-[12px]">0.7</span>
                </div>
                
                <div id="singleSelectBox"><select id="singleModel" class="bg-gray-50 border border-gray-200 py-1.5 px-4 rounded-full text-xs font-bold outline-none cursor-pointer theme-dark:bg-gray-800 theme-dark:border-gray-700 theme-dark:text-gray-200"></select></div>
                <div id="pkSelectBox" class="hidden flex items-center gap-2 text-xs font-bold text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100">
                    A: <select id="modelA" class="bg-transparent outline-none cursor-pointer"></select> | B: <select id="modelB" class="bg-transparent outline-none cursor-pointer"></select>
                </div>
                
                <div class="flex items-center gap-4 border-l border-gray-200 pl-4 theme-dark:border-gray-700">
                    <button id="themeToggle" class="text-xl opacity-70 hover:opacity-100 hover:scale-110 transition cursor-pointer" title="更换主题">🎨</button>
                    <button id="openSettings" class="text-xl opacity-70 hover:opacity-100 hover:scale-110 transition cursor-pointer" title="大脑配置">⚙️</button>
                    <button id="clearChatBtn" class="text-xl opacity-70 hover:opacity-100 hover:scale-110 transition cursor-pointer" title="清空屏幕">🧹</button>
                </div>

                <div id="themeMenu">
                    <div onclick="setTheme('')" class="theme-dot bg-[#f8fafc]" title="经典"></div>
                    <div onclick="setTheme('theme-dark')" class="theme-dot bg-gray-900" title="深空"></div>
                    <div onclick="setTheme('theme-eye')" class="theme-dot bg-green-50" title="护眼"></div>
                    <div onclick="setTheme('theme-retro')" class="theme-dot bg-orange-50" title="复古"></div>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div id="mainEditor" class="editor-container">
                <textarea id="workspace" class="writing-area custom-scroll" placeholder="左侧是对白，右侧是属于您的创作净土..."></textarea>
            </div>
            
            <div class="flex-1 flex flex-col relative">
                <main id="displayArea" class="flex-1 overflow-y-auto p-10 custom-scroll relative">
                    <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-gray-300 select-none pointer-events-none theme-dark:text-gray-700">
                        <div class="text-6xl mb-6 opacity-30 grayscale">✨</div>
                        <h2 class="text-2xl font-black tracking-widest opacity-40 italic">灵犀一点通</h2>
                        <p class="text-sm mt-3 opacity-40">在下方输入指令，或唤醒神兵武库开始创作</p>
                    </div>
                </main>
                
                <footer class="p-6 pb-8 bg-gradient-to-t from-white via-white to-transparent theme-dark:from-[#0f172a] theme-dark:via-[#0f172a] z-10">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex items-center gap-3 mb-3 pl-2">
                            <div class="flex items-center gap-2 bg-blue-50/80 px-3 py-1.5 rounded-lg border border-blue-100/50 theme-dark:bg-blue-900/20 theme-dark:border-blue-800/50">
                                <span class="text-[11px] font-black text-blue-500">⚔️ 选用兵器:</span>
                                <select id="promptSelect" class="bg-transparent text-blue-700 text-xs font-black outline-none min-w-[120px] max-w-[200px] truncate cursor-pointer theme-dark:text-blue-300"></select>
                            </div>
                            <div class="flex items-center gap-2 bg-gray-100/80 px-3 py-1.5 rounded-lg border border-gray-200/50 theme-dark:bg-gray-800 theme-dark:border-gray-700">
                                <span class="text-[11px] font-black text-gray-500 theme-dark:text-gray-400">📜 历史回溯:</span>
                                <select id="historySelect" class="bg-transparent text-gray-600 text-xs font-bold outline-none min-w-[150px] cursor-pointer theme-dark:text-gray-300">
                                    <option value="">-- 点击选择 --</option>
                                </select>
                            </div>
                        </div>

                        <div class="relative bg-white border border-gray-300 rounded-[24px] focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/10 transition-all shadow-sm theme-dark:bg-[#1e293b] theme-dark:border-gray-600">
                            <textarea id="userInput" class="w-full bg-transparent border-none pl-6 pr-6 pt-5 pb-16 text-[15px] outline-none min-h-[130px] custom-scroll resize-none theme-dark:text-gray-200" placeholder="在此输入情节需求... (按 Shift+Enter 换行，Enter 键发送)"></textarea>
                            
                            <div class="absolute bottom-3 right-3">
                                <button id="sendBtn" class="bg-blue-600 text-white px-6 py-2.5 rounded-[14px] font-black shadow-md hover:bg-blue-500 hover:shadow-lg transition-all flex items-center gap-2 active:scale-95">
                                    <span>🚀</span> 执行
                                </button>
                            </div>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <!-- 书稿编辑弹窗 -->
    <div id="bookModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[200]">
        <div class="bg-white rounded-[24px] p-6 w-full max-w-4xl shadow-2xl flex flex-col h-[80vh] theme-dark:bg-[#1e293b] border border-white/10">
            <div class="flex justify-between items-center mb-4 border-b pb-3 theme-dark:border-gray-700">
                <h3 class="text-xl font-black text-blue-600 italic flex items-center gap-2">📖 书稿编辑</h3>
                <button onclick="closeBookModal()" class="text-gray-400 hover:text-red-500 hover:bg-red-50 w-8 h-8 rounded-full flex items-center justify-center font-black text-xl transition-all">&times;</button>
            </div>
            <div class="flex flex-col h-full">
                <div class="mb-3 flex gap-3">
                    <input id="bookNameInput" type="text" placeholder="书稿名称" class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none text-sm font-bold focus:border-blue-400 focus:bg-white transition-all theme-dark:bg-gray-800 theme-dark:border-gray-700 theme-dark:text-white">
                    <div class="text-sm text-gray-500 flex items-center theme-dark:text-gray-400">
                        字数：<span id="bookWordCount" class="ml-1 text-blue-500 font-bold">0</span>
                    </div>
                </div>
                <textarea id="bookContent" class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none resize-none text-sm custom-scroll focus:border-blue-400 focus:bg-white transition-all leading-relaxed theme-dark:bg-gray-800 theme-dark:border-gray-700 theme-dark:text-gray-300"></textarea>
                <div class="flex gap-3 mt-4">
                    <button onclick="saveCurrentBook()" class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-md transition-all text-sm tracking-widest">保存书稿</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[200]">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-xl shadow-2xl transform transition-all theme-dark:bg-[#1e293b]">
            <h3 class="text-xl font-black mb-6 text-center border-b pb-4 theme-dark:text-white theme-dark:border-gray-700">⚙️ 配置大脑</h3>
            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-3 text-sm"><h4 class="text-xs font-black text-green-600 border-l-4 border-green-500 pl-2 uppercase">官方直连</h4><input id="ds_key" type="password" placeholder="DeepSeek Key" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 outline-none focus:border-blue-400"><input id="qw_key" type="password" placeholder="Qwen Key" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 outline-none focus:border-blue-400"><input id="db_key" type="password" placeholder="豆包 Key" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 outline-none focus:border-blue-400"></div>
                <div class="space-y-3 text-sm"><h4 class="text-xs font-black text-purple-600 border-l-4 border-purple-500 pl-2 uppercase">中转及其他</h4><input id="proxy_url" type="text" placeholder="Base URL" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 outline-none focus:border-blue-400"><input id="proxy_key" type="password" placeholder="中转 Key" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 outline-none focus:border-blue-400"><textarea id="proxy_models" placeholder="模型名 (逗号分隔)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-xs h-[88px] outline-none resize-none custom-scroll focus:border-blue-400"></textarea></div>
            </div>
            <div class="flex gap-4 mt-8"><button id="saveSettings" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-lg transition-all">激活</button><button id="closeSettings" class="flex-1 bg-gray-100 hover:bg-gray-200 font-bold py-3 rounded-xl text-gray-600 transition-all">关闭</button></div>
        </div>
    </div>

    <div id="promptModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[200]">
        <div class="bg-white rounded-[24px] p-6 w-full max-w-5xl shadow-2xl flex flex-col h-[80vh] theme-dark:bg-[#1e293b] border border-white/10">
            <div class="flex justify-between items-center mb-4 border-b pb-3 theme-dark:border-gray-700">
                <h3 class="text-xl font-black text-blue-600 italic flex items-center gap-2">🗡️ 神兵武库管理</h3>
                <button id="closePromptModal" class="text-gray-400 hover:text-red-500 hover:bg-red-50 w-8 h-8 rounded-full flex items-center justify-center font-black text-xl transition-all">&times;</button>
            </div>
            
            <div class="flex-1 flex gap-6 overflow-hidden mt-2">
                <div class="w-[35%] flex flex-col bg-gray-50/50 rounded-2xl border border-gray-200 overflow-hidden theme-dark:bg-gray-800/50 theme-dark:border-gray-700">
                    <div class="p-3 bg-gray-100/80 border-b border-gray-200 text-xs font-black text-gray-600 flex justify-between items-center theme-dark:bg-gray-800 theme-dark:text-gray-300 theme-dark:border-gray-700">
                        <span>📜 库中存根</span>
                        <span id="modalListCount" class="text-blue-600 bg-blue-100/50 px-2 py-0.5 rounded-full text-[10px]">0</span>
                    </div>
                    <div id="modalPromptList" class="flex-1 overflow-y-auto custom-scroll p-3 space-y-2">
                        </div>
                </div>
                
                <div class="w-[65%] flex flex-col relative">
                    <div class="flex items-center gap-2 mb-4">
                        <div id="promptEditorIcon" class="text-blue-500 text-lg">✨</div>
                        <h4 id="promptEditorTitle" class="text-sm font-black text-gray-700 theme-dark:text-gray-200">锻造新兵器</h4>
                    </div>
                    
                    <input id="modalPromptName" type="text" placeholder="给兵器起个响亮的名字..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none mb-4 text-sm font-bold focus:border-blue-400 focus:bg-white transition-all theme-dark:bg-gray-800 theme-dark:border-gray-700 theme-dark:text-white theme-dark:focus:bg-gray-900">
                    
                    <textarea id="modalPromptContent" placeholder="在此注入您的核心系统指令，支持长篇复杂逻辑..." class="w-full flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none resize-none text-sm custom-scroll focus:border-blue-400 focus:bg-white transition-all leading-relaxed theme-dark:bg-gray-800 theme-dark:border-gray-700 theme-dark:text-gray-300 theme-dark:focus:bg-gray-900"></textarea>
                    
                    <div class="flex gap-3 mt-4">
                        <button id="savePromptBtn" class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-md transition-all text-sm tracking-widest">保存入库</button>
                        <button id="resetPromptBtn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold py-3 rounded-xl transition-all text-sm theme-dark:bg-gray-700 theme-dark:text-gray-300 theme-dark:hover:bg-gray-600">清空重写</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 常量配置 ====================
        const GENE_PROMPT = `作为顶级编辑，请深度解构该文本并生成基因报告：1.叙事结构与情节逻辑；2.人物塑造；3.情感张力与写作技法；4.情绪链路与冲突密度；5.语言风格。`;
        const STORAGE_KEYS = {
            flow: 'lingxi_flow',
            prompts: 'lingxi_prompts',
            samples: 'lingxi_samples',
            history: 'lingxi_history',
            workspace: 'lingxi_workspace',
            theme: 'lingxi_theme',
            autoBackup: 'lingxi_auto_backup_snapshot',
            books: 'lingxi_books'
        };

        // ==================== 全局状态 ====================
        let flowConfig = JSON.parse(localStorage.getItem(STORAGE_KEYS.flow)) || { ds_key:'', qw_key:'', db_key:'', proxy_url:'', proxy_key:'', proxy_models:'gpt-4o' };
        let prompts = JSON.parse(localStorage.getItem(STORAGE_KEYS.prompts)) || { "灵犀助手": "你是一个智慧创作助手。" };
        let history = JSON.parse(localStorage.getItem(STORAGE_KEYS.history)) || [];
        let sampleLibrary = JSON.parse(localStorage.getItem(STORAGE_KEYS.samples)) || [];
        let bookLibrary = JSON.parse(localStorage.getItem(STORAGE_KEYS.books)) || [];
        let currentEditingBookId = null;
        
        let selectedSampleIndices = []; 
        let currentChatId = null;
        let isGenerating = false;
        let abortController = null;
        let editingOldPromptName = null;
        let autoBackupTimer = null;

        // ==================== 初始化 ====================
        function init() { 
            cacheDOMElements();
            updateSidebarPromptBadge(); 
            renderSelect(); 
            updateModelDropdowns(); 
            renderSampleLibrary(); 
            renderHistorySelect();
            initConfigInputs();
            loadWorkspace();
            renderBookLibrary();
            setTheme(localStorage.getItem(STORAGE_KEYS.theme) || ''); 
            checkEmptyState();
            initAutoBackup();
            bindEvents();
        }

        // DOM元素缓存（减少重复查询）
        let dom = {};
        function cacheDOMElements() {
            dom = {
                displayArea: document.getElementById('displayArea'),
                emptyState: document.getElementById('emptyState'),
                workspace: document.getElementById('workspace'),
                userInput: document.getElementById('userInput'),
                sendBtn: document.getElementById('sendBtn'),
                tempSlider: document.getElementById('tempSlider'),
                tempValueDisplay: document.getElementById('tempValueDisplay')
            };
        }

        // 检查空状态
        function checkEmptyState() {
            const hasMessages = dom.displayArea.querySelectorAll('.msg-wrapper, .pk-grid').length > 0;
            dom.emptyState.style.display = hasMessages ? 'none' : 'flex';
        }

        async function streamCallAI(modelName, sys, text, targetElement, temp) {
            let apiUrl, apiKey;
            
            if (modelName.startsWith('ep-') || modelName.includes('doubao')) {
                apiUrl = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';
                apiKey = flowConfig.db_key;
            } else if (modelName === 'deepseek-chat') {
                apiUrl = "https://api.deepseek.com/v1/chat/completions";
                apiKey = flowConfig.ds_key;
            } else if (modelName === 'qwen-plus') {
                apiUrl = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions";
                apiKey = flowConfig.qw_key;
            } else {
                apiUrl = flowConfig.proxy_url.trim().replace(/\/$/, '') + '/chat/completions';
                apiKey = flowConfig.proxy_key;
            }

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey.trim()}`
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [
                            { role: "system", content: sys },
                            { role: "user", content: text }
                        ],
                        stream: true,
                        temperature: temp
                    }),
                    signal: abortController.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                targetElement.textContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (!trimmedLine.startsWith('data: ')) continue;
                        
                        const data = trimmedLine.replace('data: ', '');
                        if (data === '[DONE]') break;
                        
                        try {
                            const json = JSON.parse(data);
                            const content = json.choices[0].delta.content;
                            if (content) {
                                targetElement.textContent += content;
                                dom.displayArea.scrollTop = dom.displayArea.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) {
                targetElement.textContent += e.name === 'AbortError' ? "\n[已停止执行]" : `\n[错误]: ${e.message}`;
            }
        }

        function handleFileImport(e) {
            const files = Array.from(e.target.files);

        function processFile(file) {
            if (file.name.endsWith('.docx')) {
                file.arrayBuffer().then(buffer => {
                    mammoth.extractRawText({ arrayBuffer: buffer }).then(result => {
                        sampleLibrary.push({ name: file.name, text: result.value });
                        saveAndRenderSamples();
                    });
                });
            } else {
                const reader = new FileReader();
                reader.onload = function() {
                    sampleLibrary.push({ name: file.name, text: reader.result });
                    saveAndRenderSamples();
                };
                reader.readAsText(file);
            }
        }

        function saveAndRenderSamples() {
            saveToLocal(STORAGE_KEYS.samples, sampleLibrary);
            renderSampleLibrary();
        }

        function appendMsg(role, text) { 
            const wrapper = document.createElement('div'); 
            wrapper.className = `msg-wrapper relative z-10 ${role === 'user' ? 'items-end' : 'items-start'}`; 
            wrapper.innerHTML = `<div class="${role}-msg"><div class="msg-body">${text}</div></div>`; 
            dom.displayArea.appendChild(wrapper); 
            dom.displayArea.scrollTop = dom.displayArea.scrollHeight; 
            checkEmptyState();
            return wrapper; 
        }
        
        function createPKCol(modelName) {
            const col = document.createElement('div');
            col.className = "pk-column shadow-xl flex-1 bg-white rounded-2xl overflow-hidden border border-gray-200 theme-dark:bg-[#1e293b] theme-dark:border-gray-700";
            col.innerHTML = `
                <div class="pk-header bg-gray-50/80 font-bold p-3 border-b text-center text-sm text-gray-600 theme-dark:bg-gray-800 theme-dark:text-gray-300 theme-dark:border-gray-700">${modelName}</div>
                <div class="pk-body custom-scroll p-6 text-[15px] leading-relaxed theme-dark:text-gray-200"></div>
            `;
            return col;
        }

        function saveHistory() {
            const clone = dom.displayArea.cloneNode(true);
            const empty = clone.querySelector('#emptyState');
            if(empty) empty.remove();
            
            const content = clone.innerHTML.trim();
            if(!content) return;
            
            const now = new Date();
            const timeStr = `${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            if(!currentChatId) {
                currentChatId = Date.now().toString();
                const title = clone.querySelector('.user-msg')?.textContent.slice(0, 12) || "新创作";
                history.push({ id: currentChatId, title, content, time: timeStr });
            } else {
                const index = history.findIndex(h => h.id === currentChatId);
                if(index !== -1) {
                    history[index].content = content;
                    history[index].time = timeStr;
                }
            }
            saveToLocal(STORAGE_KEYS.history, history);
        }

        function renderHistorySelect() {
            const sel = document.getElementById('historySelect');
            sel.innerHTML = '<option value="">-- 点击选择回溯 --</option>';
            
            [...history].reverse().forEach(chat => {
                const opt = document.createElement('option');
                opt.value = chat.id;
                opt.textContent = `${chat.time} | ${chat.title}`;
                sel.appendChild(opt);
            });

            sel.onchange = () => {
                const chat = history.find(h => h.id === sel.value);
                if(chat) {
                    currentChatId = chat.id;
                    dom.displayArea.innerHTML = `<div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-gray-300 select-none pointer-events-none hidden"></div>${chat.content}`;
                    dom.emptyState = document.getElementById('emptyState');
                    checkEmptyState();
                }
            };
        }

        // 本地存储工具
        function saveToLocal(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function saveAllData() {
            saveToLocal(STORAGE_KEYS.flow, flowConfig);
            saveToLocal(STORAGE_KEYS.prompts, prompts);
            saveToLocal(STORAGE_KEYS.samples, sampleLibrary);
            saveToLocal(STORAGE_KEYS.history, history);
            saveToLocal(STORAGE_KEYS.books, bookLibrary);
            saveToLocal(STORAGE_KEYS.workspace, dom.workspace.value);
        }

        function initConfigInputs() {
            Object.keys(flowConfig).forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = flowConfig[id];
            });
        }

        function loadWorkspace() {
            dom.workspace.value = localStorage.getItem(STORAGE_KEYS.workspace) || '';
        }

        // 事件绑定统一管理
        function bindEvents() {
            // 模态框
            document.getElementById('openPromptModalBtn').onclick = () => {
                renderModalPromptList();
                resetPromptEditor();
                document.getElementById('promptModal').classList.remove('hidden');
            };
            document.getElementById('closePromptModal').onclick = () => {
                document.getElementById('promptModal').classList.add('hidden');
            };
            document.getElementById('resetPromptBtn').onclick = resetPromptEditor;
            document.getElementById('savePromptBtn').onclick = savePrompt;

            // 主题
            document.getElementById('themeToggle').onclick = toggleThemeMenu;
            window.onclick = () => document.getElementById('themeMenu').style.display = 'none';

            // 系统
            document.getElementById('exportSystemBtn').onclick = exportSystemData;
            document.getElementById('importSystemInput').onchange = importSystemData;

            // 滑块
            dom.tempSlider.oninput = () => {
                dom.tempValueDisplay.textContent = dom.tempSlider.value;
            };

            // 输入回车
            dom.userInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
            dom.sendBtn.onclick = handleSend;

            // 分屏
            document.getElementById('toggleSpace').onclick = toggleEditor;
            dom.workspace.oninput = () => {
                saveToLocal(STORAGE_KEYS.workspace, dom.workspace.value);
            };

            // 模式切换
            document.getElementById('modeChat').onclick = () => switchMode(false);
            document.getElementById('modePK').onclick = () => switchMode(true);

            // 设置
            document.getElementById('openSettings').onclick = () => {
                document.getElementById('settingsModal').classList.remove('hidden');
            };
            document.getElementById('saveSettings').onclick = saveSettings;
            document.getElementById('closeSettings').onclick = () => {
                document.getElementById('settingsModal').classList.add('hidden');
            };

            // 清空
            document.getElementById('newChatBtn').onclick = resetChat;
            document.getElementById('clearChatBtn').onclick = () => {
                if(confirm("确定清空当前屏幕内容吗？")) resetChat();
            };

            // 文件导入
            document.getElementById('fileInput').onchange = handleFileImport;

            // 书稿字数实时统计
            document.getElementById('bookContent').addEventListener('input', updateWordCount);

            // 一键排版
            document.getElementById('typesetBtn').onclick = typesetContent;
        }

        // 启动
        init();
    </script>
</body>
</html>
