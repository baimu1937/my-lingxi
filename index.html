<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>灵犀 - 妙笔千般意</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --bg-main: #f4f7f9;
            --bg-sidebar: #1e222d;
            --accent-blue: #3b82f6;
            --text-sidebar: #a0aec0;
        }

        /* 主题方案 */
        .theme-dark { --bg-main: #111827; }
        .theme-eye { --bg-main: #e8f3e8; }
        .theme-retro { --bg-main: #f4ece0; }

        body { 
            background-color: var(--bg-main); 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            transition: all 0.3s ease;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 10px; }

        /* 侧边栏样式 */
        .sidebar { width: 320px; background: var(--bg-sidebar); color: white; box-shadow: 4px 0 20px rgba(0,0,0,0.2); z-index: 50; }
        .weapon-card {
            background: rgba(255,255,255,0.05); padding: 14px; border-radius: 12px;
            margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
        }
        .weapon-card:hover { border-color: var(--accent-blue); background: rgba(59,130,246,0.1); }

        /* 对话气泡 */
        .msg-wrapper { margin-bottom: 2rem; }
        .user-msg { background: var(--accent-blue); color: white; padding: 1.2rem; border-radius: 20px 20px 4px 20px; font-size: 16px; box-shadow: 0 4px 12px rgba(59,130,246,0.2); }
        .ai-msg { background: white; color: #1e293b; padding: 1.4rem; border-radius: 20px 20px 20px 4px; font-size: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); line-height: 1.8; }

        /* 擂台模式布局 */
        .pk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; height: 100%; }
        .pk-column { background: white; border-radius: 20px; border: 1px solid #e2e8f0; padding: 1.5rem; display: flex; flex-direction: column; overflow: hidden; }
        .model-tag { background: #eff6ff; color: #3b82f6; padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 12px; margin-bottom: 1rem; width: fit-content; }

        /* 色盘浮窗 */
        #themeMenu { display: none; position: absolute; right: 40px; top: 70px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 10px; z-index: 100; border: 1px solid #eee; }
        .theme-dot { width: 24px; height: 24px; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="sidebar flex flex-col">
        <div class="p-8 border-b border-white/5">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-3xl font-black text-blue-400 italic">灵犀</h1>
                <div class="flex gap-3">
                    <button id="exportBtn" title="全量备份" class="text-xl">💾</button>
                    <button id="importBtn" title="全量恢复" class="text-xl">📂</button>
                    <input type="file" id="importFile" class="hidden" accept=".json">
                </div>
            </div>
            <p class="text-[12px] text-blue-300/80 italic">妙笔千般意，灵犀一点通</p>
        </div>
        
        <div class="flex-1 overflow-y-auto custom-scroll p-6 space-y-8">
            <div class="flex bg-black/30 p-1.5 rounded-2xl border border-white/10">
                <button id="modeChat" class="flex-1 py-2 text-[12px] rounded-xl font-bold bg-blue-600 text-white shadow-lg">单人创作</button>
                <button id="modePK" class="flex-1 py-2 text-[12px] rounded-xl text-gray-400 hover:text-white transition">竞技擂台</button>
            </div>

            <section>
                <div class="flex justify-between items-center mb-4 px-1">
                    <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest">📜 历史卷轴</span>
                    <button id="newChatBtn" class="text-blue-400 text-[11px] font-bold">+ 新开篇</button>
                </div>
                <div id="historyList" class="space-y-2"></div>
            </section>
            
            <section>
                <span class="text-[11px] font-black text-blue-500 uppercase tracking-widest mb-4 block px-1 text-center">⚔️ 创作兵器</span>
                <div id="promptList" class="space-y-2"></div>
                <div class="mt-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <input id="newPromptName" type="text" placeholder="兵器名称" class="w-full bg-transparent border-b border-white/20 pb-1 text-sm outline-none mb-3 text-white">
                    <textarea id="newPromptContent" placeholder="提示词内容..." class="w-full bg-transparent text-sm h-24 outline-none resize-none text-gray-400 custom-scroll"></textarea>
                    <button id="addPromptBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 mt-2 rounded-xl text-[13px] font-bold transition-all shadow-lg">加入兵器库</button>
                </div>
            </section>

            <section class="pb-10">
                <div class="flex justify-between items-center mb-3 px-1">
                    <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest">📖 例文参照</span>
                    <button onclick="document.getElementById('fileInput').click()" class="text-blue-400 text-[11px] font-bold">+ 上传</button>
                </div>
                <input type="file" id="fileInput" class="hidden" multiple accept=".txt,.docx">
                <div id="sampleLibrary" class="space-y-2"></div>
            </section>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-100 flex items-center px-10 justify-between z-10">
            <div class="flex items-center gap-4">
                <div class="w-1.5 h-6 bg-blue-500 rounded-full"></div>
                <h2 id="workTitle" class="text-lg font-bold text-gray-700 italic">单人创作模式</h2>
            </div>
            <div class="flex items-center gap-4 relative">
                <div id="singleSelectBox" class="flex items-center gap-3">
                    <select id="singleModel" class="bg-gray-50 border border-gray-200 py-2 px-6 rounded-full text-[13px] font-bold outline-none"></select>
                </div>
                <div id="pkSelectBox" class="hidden flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-full border border-blue-100 text-[11px] font-bold text-blue-600">
                    A: <select id="modelA" class="bg-transparent outline-none"></select>
                    B: <select id="modelB" class="bg-transparent outline-none"></select>
                </div>
                
                <button id="themeToggle" class="text-xl p-2 hover:bg-gray-100 rounded-full">🎨</button>
                <div id="themeMenu" class="flex gap-2">
                    <div onclick="setTheme('')" class="theme-dot bg-white" title="白天模式"></div>
                    <div onclick="setTheme('theme-dark')" class="theme-dot bg-gray-800" title="黑夜模式"></div>
                    <div onclick="setTheme('theme-eye')" class="theme-dot bg-green-100" title="护眼模式"></div>
                    <div onclick="setTheme('theme-retro')" class="theme-dot bg-orange-100" title="复古模式"></div>
                </div>

                <button id="openSettings" class="text-xl p-2 hover:bg-gray-100 rounded-full">⚙️</button>
                <button id="clearChatBtn" class="text-xl p-2 hover:bg-gray-100 rounded-full">🧹</button>
            </div>
        </header>

        <main id="displayArea" class="flex-1 overflow-y-auto p-12 custom-scroll"></main>

        <footer class="p-8 bg-white border-t border-gray-100">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-[12px] font-black text-gray-400 uppercase italic">选用兵器:</span>
                    <select id="promptSelect" class="bg-blue-50 text-blue-600 py-1 px-4 rounded-xl text-[13px] font-bold border border-blue-100 outline-none"></select>
                </div>
                <div class="bg-gray-50 border-2 border-gray-200 rounded-3xl p-2 focus-within:bg-white focus-within:border-blue-500 transition-all">
                    <textarea id="userInput" class="w-full bg-transparent border-none px-6 py-4 text-lg outline-none custom-scroll min-h-[120px]" placeholder="在此挥笔创作..."></textarea>
                    <div class="flex justify-end p-2 border-t border-gray-100 mt-2">
                        <button id="sendBtn" class="bg-blue-600 text-white px-12 py-3 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">开始执行</button>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[40px] p-12 w-full max-w-2xl shadow-2xl">
            <h3 class="text-2xl font-black mb-8 italic text-center border-b pb-4">⚙️ 配置创作大脑</h3>
            <div class="grid grid-cols-2 gap-10">
                <div class="space-y-4">
                    <h4 class="text-xs font-black text-green-600 border-l-4 border-green-500 pl-2">官方直连</h4>
                    <input id="ds_key" type="password" placeholder="DeepSeek Key" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none">
                    <input id="qw_key" type="password" placeholder="Qwen Key" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none">
                    <input id="db_key" type="password" placeholder="豆包官方 Key" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none">
                </div>
                <div class="space-y-4">
                    <h4 class="text-xs font-black text-purple-600 border-l-4 border-purple-500 pl-2">中转及其他</h4>
                    <input id="proxy_url" type="text" placeholder="Base URL" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none">
                    <input id="proxy_key" type="password" placeholder="中转 API Key" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none">
                    <textarea id="proxy_models" placeholder="模型列表(英文逗号分隔)..." class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-[11px] h-24 outline-none"></textarea>
                </div>
            </div>
            <div class="flex gap-4 mt-10"><button id="saveSettings" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl">激活大脑</button><button id="closeSettings" class="flex-1 bg-gray-100 font-bold py-4 rounded-2xl">关闭</button></div>
        </div>
    </div>

    <script>
        const DOMESTIC_MAP = { 'deepseek-chat': '深度求索 V3', 'qwen-plus': '通义千问 Plus' };
        const API_URLS = { 'deepseek-chat': 'https://api.deepseek.com/v1/chat/completions', 'qwen-plus': 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions' };
        
        let flowConfig = JSON.parse(localStorage.getItem('lingxi_flow')) || { ds_key:'', qw_key:'', db_key:'', proxy_url:'', proxy_key:'', proxy_models:'gpt-4o,claude-3-5-sonnet-20240620' };
        let prompts = JSON.parse(localStorage.getItem('lingxi_prompts')) || { "灵犀助手": "你是一个充满智慧的创作助手。" };
        let history = JSON.parse(localStorage.getItem('lingxi_history')) || [];
        let sampleLibrary = []; let activeSampleIndex = -1; let isPKMode = false; let currentChatId = null;
        let abortController = null; let isGenerating = false;

        function init() {
            renderPromptList(); renderSelect(); updateModelDropdowns(); renderHistory();
            Object.keys(flowConfig).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = flowConfig[id]; });
        }

        // 核心：模式切换逻辑
        const modeChat = document.getElementById('modeChat');
        const modePK = document.getElementById('modePK');
        modeChat.onclick = () => switchMode(false);
        modePK.onclick = () => switchMode(true);

        function switchMode(pk) {
            isPKMode = pk;
            modeChat.className = pk ? "flex-1 py-2 text-[12px] rounded-xl text-gray-400" : "flex-1 py-2 text-[12px] rounded-xl font-bold bg-blue-600 text-white shadow-lg";
            modePK.className = !pk ? "flex-1 py-2 text-[12px] rounded-xl text-gray-400" : "flex-1 py-2 text-[12px] rounded-xl font-bold bg-blue-600 text-white shadow-lg";
            document.getElementById('singleSelectBox').classList.toggle('hidden', pk);
            document.getElementById('pkSelectBox').classList.toggle('hidden', !pk);
            document.getElementById('workTitle').innerText = pk ? "竞技擂台模式" : "单人创作模式";
            document.getElementById('displayArea').innerHTML = ''; currentChatId = null;
        }

        // 核心：色盘逻辑
        document.getElementById('themeToggle').onclick = (e) => {
            e.stopPropagation();
            const menu = document.getElementById('themeMenu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        };
        window.onclick = () => document.getElementById('themeMenu').style.display = 'none';
        window.setTheme = (t) => { document.body.className = 'h-screen flex overflow-hidden ' + t; localStorage.setItem('lingxi_theme', t); };
        setTheme(localStorage.getItem('lingxi_theme') || '');

        // 核心：例文上传逻辑
        document.getElementById('fileInput').onchange = async (e) => {
            for (let file of e.target.files) {
                let content = file.name.endsWith('.docx') ? (await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()})).value : await file.text();
                sampleLibrary.push({ name: file.name, text: content });
            }
            activeSampleIndex = sampleLibrary.length - 1; renderSampleLibrary();
        };

        function renderSampleLibrary() {
            const container = document.getElementById('sampleLibrary'); container.innerHTML = '';
            sampleLibrary.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border text-[11px] cursor-pointer mb-1 flex justify-between ${activeSampleIndex === i ? 'bg-blue-600/10 border-blue-500 text-blue-400 font-bold' : 'bg-white/5 border-white/5 text-gray-500'}`;
                div.onclick = () => { activeSampleIndex = i; renderSampleLibrary(); };
                div.innerHTML = `<span>${s.name}</span><button onclick="event.stopPropagation(); sampleLibrary.splice(${i},1); renderSampleLibrary();" class="text-red-400">×</button>`;
                container.appendChild(div);
            });
        }

        // 核心：发送逻辑
        document.getElementById('sendBtn').onclick = async () => {
            const btn = document.getElementById('sendBtn');
            if (isGenerating) { abortController.abort(); isGenerating = false; btn.innerText = "开始执行"; return; }
            const input = document.getElementById('userInput'); const text = input.value.trim(); if(!text) return;
            const sys = prompts[document.getElementById('promptSelect').value] || "";
            const fullSys = sys + (activeSampleIndex !== -1 ? `\n\n【参考例文】\n${sampleLibrary[activeSampleIndex].text}` : "");
            
            input.value = ''; isGenerating = true; btn.innerText = "立即中断"; 
            abortController = new AbortController();
            
            const display = document.getElementById('displayArea');
            if(isPKMode) {
                const pkGrid = document.createElement('div'); pkGrid.className = "pk-grid mb-8";
                const colA = document.createElement('div'); colA.className = "pk-column"; 
                const colB = document.createElement('div'); colB.className = "pk-column";
                colA.innerHTML = `<div class="model-tag">${document.getElementById('modelA').value}</div><div class="msg-body"></div>`;
                colB.innerHTML = `<div class="model-tag">${document.getElementById('modelB').value}</div><div class="msg-body"></div>`;
                pkGrid.append(colA, colB); display.appendChild(pkGrid);
                await Promise.all([
                    streamCallAI(document.getElementById('modelA').value, fullSys, text, colA.querySelector('.msg-body')),
                    streamCallAI(document.getElementById('modelB').value, fullSys, text, colB.querySelector('.msg-body'))
                ]);
            } else {
                appendMessage('user', text);
                const aiWrapper = appendMessage('ai', "正在思考...");
                await streamCallAI(document.getElementById('singleModel').value, fullSys, text, aiWrapper.querySelector('.msg-body'));
            }
            isGenerating = false; btn.innerText = "开始执行"; saveCurrentToHistory();
        };

        // ... 其余逻辑 (streamCallAI, renderHistory, init等) 与之前版本保持一致 ...
        async function streamCallAI(modelName, sys, text, targetElement) {
            let apiUrl = ""; let apiKey = ""; 
            if (modelName === 'deepseek-chat') { apiUrl = API_URLS[modelName]; apiKey = flowConfig.ds_key; }
            else if (modelName === 'qwen-plus') { apiUrl = API_URLS[modelName]; apiKey = flowConfig.qw_key; }
            else if (modelName.startsWith('ep-')) { apiUrl = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions'; apiKey = flowConfig.db_key; }
            else { apiUrl = flowConfig.proxy_url; apiKey = flowConfig.proxy_key; }
            try {
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey.trim()}` }, body: JSON.stringify({ model: modelName, messages: [{role:"system", content: sys}, {role:"user", content: text}], stream: true }), signal: abortController.signal });
                const reader = response.body.getReader(); const decoder = new TextDecoder(); targetElement.innerText = '';
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    const chunk = decoder.decode(value); const lines = chunk.split('\n');
                    for (const line of lines) { if (line.trim().startsWith('data: ')) { const d = line.replace('data: ', '').trim(); if (d === '[DONE]') break; try { const j = JSON.parse(d); const c = j.choices[0].delta.content; if (c) { targetElement.innerText += c; document.getElementById('displayArea').scrollTop = document.getElementById('displayArea').scrollHeight; } } catch(e) {} } }
                }
            } catch (e) { targetElement.innerText += e.name === 'AbortError' ? "\n[已中断]" : "\n[错误]: " + e.message; }
        }

        function appendMessage(s, t) {
            const c = document.getElementById('displayArea');
            const wrapper = document.createElement('div'); wrapper.className = 'msg-wrapper flex flex-col ' + (s === 'user' ? 'items-end' : 'items-start');
            wrapper.innerHTML = `<div class="${s}-msg"><div class="msg-body">${t}</div></div>`;
            c.appendChild(wrapper); c.scrollTop = c.scrollHeight; return wrapper;
        }

        function renderHistory() {
            const list = document.getElementById('historyList'); list.innerHTML = '';
            history.slice(-10).forEach((chat) => {
                const div = document.createElement('div');
                div.className = `group p-3 rounded-xl text-[12px] cursor-pointer transition-all ${currentChatId === chat.id ? 'bg-blue-600 text-white font-bold' : 'text-gray-400 hover:bg-white/5'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `<div class="flex justify-between items-center"><span class="truncate pr-2 italic"># ${chat.title}</span><button onclick="event.stopPropagation(); deleteHistory('${chat.id}')" class="opacity-0 group-hover:opacity-100 text-red-400">×</button></div>`;
                list.prepend(div);
            });
        }
        function loadChat(id) { currentChatId = id; const chat = history.find(h => h.id === id); const display = document.getElementById('displayArea'); display.innerHTML = chat ? chat.content : ''; display.scrollTop = display.scrollHeight; renderHistory(); }
        function saveCurrentToHistory() { 
            const content = document.getElementById('displayArea').innerHTML; if(!content.trim()) return;
            if(!currentChatId) { currentChatId = Date.now().toString(); const title = document.querySelector('.user-msg')?.innerText.slice(0, 8) || "新对话"; history.push({ id: currentChatId, title, content }); }
            else { const idx = history.findIndex(h => h.id === currentChatId); if(idx !== -1) history[idx].content = content; }
            localStorage.setItem('lingxi_history', JSON.stringify(history)); renderHistory();
        }
        function deleteHistory(id) { history = history.filter(h => h.id !== id); localStorage.setItem('lingxi_history', JSON.stringify(history)); renderHistory(); }

        function updateModelDropdowns() {
            const custom = flowConfig.proxy_models.split(/[,，]/).map(m => m.trim()).filter(m => m);
            const all = [...Object.keys(DOMESTIC_MAP), ...custom];
            ['singleModel', 'modelA', 'modelB'].forEach(id => {
                const el = document.getElementById(id); el.innerHTML = '';
                all.forEach(m => { el.innerHTML += `<option value="${m}">${DOMESTIC_MAP[m] || m.toUpperCase()}</option>`; });
            });
        }

        document.getElementById('exportBtn').onclick = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({prompts, flowConfig})], {type: "application/json"})); a.download = "灵犀备份.json"; a.click(); };
        document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
        document.getElementById('importFile').onchange = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                if(data.prompts) prompts = data.prompts; if(data.flowConfig) flowConfig = data.flowConfig;
                localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig));
                init(); alert("全量恢复成功！");
            }; reader.readAsText(file);
        };
        document.getElementById('openSettings').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('saveSettings').onclick = () => {
            Object.keys(flowConfig).forEach(id => flowConfig[id] = document.getElementById(id).value.trim());
            localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig)); updateModelDropdowns();
            document.getElementById('settingsModal').classList.add('hidden'); alert("大脑配置更新！");
        };
        document.getElementById('clearChatBtn').onclick = () => { if(confirm("清空当前显示？")) document.getElementById('displayArea').innerHTML = ''; };
        window.previewPrompt = (k) => { document.getElementById('newPromptName').value = k; document.getElementById('newPromptContent').value = prompts[k]; };
        function renderPromptList() {
            const l = document.getElementById('promptList'); l.innerHTML = '';
            Object.keys(prompts).forEach(k => {
                l.innerHTML += `<div onclick="previewPrompt('${k}')" class="weapon-card flex justify-between items-center group">
                    <span class="text-[13px] font-bold"><span class="text-blue-500 mr-2">✦</span>${k}</span>
                    <button onclick="event.stopPropagation(); deleteP('${k}')" class="opacity-0 group-hover:opacity-100 text-red-500">×</button>
                </div>`;
            });
        }
        function renderSelect() { const s = document.getElementById('promptSelect'); s.innerHTML = ''; Object.keys(prompts).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`); }
        document.getElementById('addPromptBtn').onclick = () => { const n = document.getElementById('newPromptName').value.trim(); const c = document.getElementById('newPromptContent').value.trim(); if(n && c) { prompts[n] = c; localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); renderPromptList(); renderSelect(); } };
        window.deleteP = (k) => { if(confirm("删除兵器？")) { delete prompts[k]; localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); renderPromptList(); renderSelect(); } };

        init();
    </script>
</body>
</html>
