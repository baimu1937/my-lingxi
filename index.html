<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>灵犀 - 妙笔千般意</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        /* 🎨 全局雅致 UI 设计 */
        :root {
            --bg-main: #f4f7f9;
            --bg-sidebar: #1a1c24;
            --accent-color: #3b82f6;
            --text-sidebar: #a0aec0;
            --card-radius: 18px;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 10px; }

        body { 
            background-color: var(--bg-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: all 0.3s ease; 
        }

        /* 🖼️ 左侧栏优化：增加高级感和呼吸感 */
        .sidebar {
            width: 300px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .sidebar h1 { letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        .slogan-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ⚔️ 兵器库卡片优化 */
        .weapon-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .weapon-card:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent-color);
            transform: translateX(4px);
        }

        /* 💬 对话气泡美化：加大字号，增加间距 */
        .msg-wrapper { margin-bottom: 1.5rem; line-height: 1.6; }
        .user-msg {
            background: #3b82f6;
            color: white;
            padding: 1rem 1.4rem;
            border-radius: 20px 20px 4px 20px;
            font-size: 15px;
            max-width: 80%;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }
        .ai-msg {
            background: white;
            color: #2d3748;
            padding: 1.2rem 1.6rem;
            border-radius: 20px 20px 20px 4px;
            font-size: 16px;
            max-width: 85%;
            border: 1px solid #edf2f7;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* ⌨️ 底座输入区优化 */
        .input-base {
            background: white;
            border-radius: 24px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 8px;
        }
        .input-base:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        #userInput { font-size: 15px; }

        .btn-send {
            background: var(--accent-color);
            border-radius: 16px;
            padding: 10px 32px;
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="sidebar flex flex-col z-20">
        <div class="p-8 border-b border-white/10">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-black text-blue-400 italic">灵犀</h1>
                <div class="flex gap-2">
                    <button id="exportBtn" title="备份" class="text-xl hover:scale-110 transition">💾</button>
                    <button id="importBtn" title="恢复" class="text-xl hover:scale-110 transition">📂</button>
                    <input type="file" id="importFile" class="hidden" accept=".json">
                </div>
            </div>
            <div class="slogan-box">
                <p class="text-[12px] text-blue-300 font-bold italic tracking-wider leading-relaxed">妙笔千般意<br>灵犀一点通</p>
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto custom-scroll p-6 space-y-8">
            <div class="flex bg-black/20 p-1 rounded-2xl border border-white/5">
                <button id="modeChat" class="flex-1 py-2 text-[12px] rounded-xl font-bold bg-blue-600 text-white shadow-lg">单人创作</button>
                <button id="modePK" class="flex-1 py-2 text-[12px] rounded-xl text-gray-400 hover:text-white transition">竞技擂台</button>
            </div>

            <section>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-black text-gray-500 uppercase tracking-[0.2em]">📜 历史卷轴</span>
                    <button id="newChatBtn" class="text-blue-400 text-[11px] font-bold">+ 新开篇</button>
                </div>
                <div id="historyList" class="space-y-2"></div>
            </section>
            
            <section>
                <span class="text-[11px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4 block">⚔️ 创作兵器</span>
                <div id="promptList"></div>
                <div class="mt-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <input id="newPromptName" type="text" placeholder="兵器名" class="w-full bg-transparent border-b border-white/20 pb-1 text-xs outline-none focus:border-blue-400 mb-3 text-white">
                    <textarea id="newPromptContent" placeholder="提示词内容..." class="w-full bg-transparent text-xs h-20 outline-none resize-none text-gray-300 custom-scroll"></textarea>
                    <button id="addPromptBtn" class="w-full bg-blue-600/80 hover:bg-blue-600 py-2 mt-2 rounded-xl text-[11px] font-bold transition-all">收纳兵器</button>
                </div>
            </section>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 flex items-center px-10 justify-between bg-white border-b border-gray-100 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <div class="w-2 h-8 bg-blue-500 rounded-full"></div>
                <h2 class="text-lg font-bold text-gray-700 italic">创作工作台</h2>
            </div>
            <div class="flex items-center gap-4">
                <select id="singleModel" class="bg-gray-50 border border-gray-200 py-2 px-6 rounded-full text-[13px] font-bold outline-none text-gray-700 hover:border-blue-300 transition-all"></select>
                <div id="pkModelInfo" class="hidden items-center gap-3 bg-blue-50 px-4 py-2 rounded-full border border-blue-100 text-[11px] font-bold text-blue-600">
                    A: <select id="modelA" class="bg-transparent outline-none"></select>
                    B: <select id="modelB" class="bg-transparent outline-none"></select>
                </div>
                <button id="openSettings" class="text-xl p-2 hover:bg-gray-100 rounded-full transition">⚙️</button>
                <button id="clearChatBtn" class="text-xl p-2 hover:bg-gray-100 rounded-full transition">🧹</button>
            </div>
        </header>

        <main id="displayArea" class="flex-1 overflow-y-auto p-12 flex flex-col custom-scroll"></main>

        <footer class="p-8 bg-white border-t border-gray-100">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-[12px] font-black text-gray-400 italic">当前选用:</span>
                    <select id="promptSelect" class="bg-blue-50 text-blue-600 py-1.5 px-4 rounded-xl text-[13px] font-bold outline-none border border-blue-100"></select>
                </div>
                <div class="input-base">
                    <textarea id="userInput" class="w-full bg-transparent border-none px-6 py-3 outline-none custom-scroll text-gray-700" placeholder="在此挥笔... (Shift+Enter换行，Enter执行)"></textarea>
                    <div class="flex justify-end p-2 border-t border-gray-50 mt-2 pt-3">
                        <button id="sendBtn" class="btn-send text-white active:scale-95 transition-all">开始执行</button>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-md flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[32px] p-10 w-full max-w-2xl shadow-2xl max-h-[90vh] overflow-y-auto custom-scroll">
            <h3 class="text-2xl font-black mb-8 italic border-b pb-4 text-center text-gray-800">⚙️ 配置创作大脑</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <h4 class="text-xs font-black text-green-600 pl-2 uppercase tracking-widest border-l-4 border-green-500">官方直连</h4>
                    <input id="ds_key" type="password" placeholder="DeepSeek Key" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none focus:border-green-400 transition-all">
                    <input id="qw_key" type="password" placeholder="Qwen Key" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none focus:border-green-400 transition-all">
                    <input id="db_key" type="password" placeholder="豆包官方 sk-..." class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none focus:border-green-400 transition-all">
                </div>
                <div class="space-y-4">
                    <h4 class="text-xs font-black text-purple-600 pl-2 uppercase tracking-widest border-l-4 border-purple-500">中转大脑</h4>
                    <input id="proxy_url" type="text" placeholder="Base URL" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none focus:border-purple-400 transition-all">
                    <input id="proxy_key" type="password" placeholder="中转 API Key" class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-sm outline-none focus:border-purple-400 transition-all">
                    <textarea id="proxy_models" placeholder="模型列表..." class="w-full bg-gray-50 border rounded-2xl px-5 py-3 text-[10px] h-24 outline-none"></textarea>
                </div>
            </div>
            <div class="flex gap-4 mt-10 pt-6 border-t">
                <button id="saveSettings" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-blue-700 transition">激活大脑</button>
                <button id="closeSettings" class="flex-1 bg-gray-100 text-gray-500 font-bold py-4 rounded-2xl hover:bg-gray-200 transition">暂不配置</button>
            </div>
        </div>
    </div>

    <script>
        // JS 逻辑保持不变，确保功能 100% 正常
        const DOMESTIC_MAP = { 'deepseek-chat': '深度求索 V3', 'qwen-plus': '通义千问 Plus' };
        const API_URLS = { 'deepseek-chat': 'https://api.deepseek.com/v1/chat/completions', 'qwen-plus': 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions' };
        
        let flowConfig = JSON.parse(localStorage.getItem('lingxi_flow')) || { ds_key:'', qw_key:'', db_key:'', proxy_url:'', proxy_key:'', proxy_models:'gpt-4o,claude-3-5-sonnet-20240620' };
        let prompts = JSON.parse(localStorage.getItem('lingxi_prompts')) || { "灵犀助手": "你是一个充满智慧的创作助手。" };
        let history = JSON.parse(localStorage.getItem('lingxi_history')) || [];
        let sampleLibrary = []; let activeSampleIndex = -1; let isPKMode = false; let currentChatId = null;
        let abortController = null; let isGenerating = false;

        function init() {
            renderPromptList(); renderSelect(); updateModelDropdowns(); renderHistory();
            Object.keys(flowConfig).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = flowConfig[id]; });
        }

        function renderHistory() {
            const list = document.getElementById('historyList'); list.innerHTML = '';
            history.slice(-10).forEach((chat) => {
                const div = document.createElement('div');
                div.className = `group p-3 rounded-xl text-[12px] cursor-pointer transition-all border border-transparent ${currentChatId === chat.id ? 'bg-blue-600 text-white font-bold shadow-lg' : 'text-gray-400 hover:bg-white/10 hover:border-white/10'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `<div class="flex justify-between items-center"><span class="truncate pr-2 italic"># ${chat.title}</span><button onclick="event.stopPropagation(); deleteHistory('${chat.id}')" class="opacity-0 group-hover:opacity-100 text-red-400">×</button></div>`;
                list.prepend(div);
            });
        }

        function loadChat(id) { currentChatId = id; const chat = history.find(h => h.id === id); const display = document.getElementById('displayArea'); display.innerHTML = chat ? chat.content : ''; display.scrollTop = display.scrollHeight; renderHistory(); }
        
        function saveCurrentToHistory() { 
            const content = document.getElementById('displayArea').innerHTML; if(!content.trim()) return;
            const now = new Date(); const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            if(!currentChatId) { currentChatId = Date.now().toString(); const title = document.querySelector('.user-msg')?.innerText.slice(0, 8) || "新对话"; history.push({ id: currentChatId, title, content, time: timeStr }); }
            else { const idx = history.findIndex(h => h.id === currentChatId); if(idx !== -1) history[idx].content = content; }
            localStorage.setItem('lingxi_history', JSON.stringify(history)); renderHistory();
        }

        document.getElementById('exportBtn').onclick = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({prompts, flowConfig})], {type: "application/json"})); a.download = "灵犀全量备份.json"; a.click(); };
        document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
        document.getElementById('importFile').onchange = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if(data.prompts) prompts = data.prompts; if(data.flowConfig) flowConfig = data.flowConfig;
                    localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig));
                    init(); alert("兵器库与大脑配置已归位！");
                } catch(e) { alert("导入失败，格式错误"); }
            }; reader.readAsText(file);
        };

        document.getElementById('sendBtn').onclick = async () => {
            const btn = document.getElementById('sendBtn'); if (isGenerating) { abortController.abort(); isGenerating = false; btn.innerText = "开始执行"; return; }
            const input = document.getElementById('userInput'); const text = input.value.trim(); if(!text) return;
            const sys = prompts[document.getElementById('promptSelect').value] || "";
            input.value = ''; isGenerating = true; btn.innerText = "立即中断"; btn.className = "btn-send bg-red-500 text-white";
            abortController = new AbortController();
            
            appendMessage('user', text);
            const aiWrapper = appendMessage('ai', "思考中..."); 
            await streamCallAI(document.getElementById('singleModel').value, sys, text, aiWrapper.querySelector('.msg-body'));
            
            isGenerating = false; btn.innerText = "开始执行"; btn.className = "btn-send text-white";
            saveCurrentToHistory();
        };

        async function streamCallAI(modelName, sys, text, targetElement) {
            let apiUrl = ""; let apiKey = ""; 
            if (modelName === 'deepseek-chat') { apiUrl = API_URLS[modelName]; apiKey = flowConfig.ds_key; }
            else if (modelName === 'qwen-plus') { apiUrl = API_URLS[modelName]; apiKey = flowConfig.qw_key; }
            else { apiUrl = flowConfig.proxy_url; apiKey = flowConfig.proxy_key; }
            
            try {
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey.trim()}` }, body: JSON.stringify({ model: modelName, messages: [{role:"system", content: sys}, {role:"user", content: text}], stream: true }), signal: abortController.signal });
                const reader = response.body.getReader(); const decoder = new TextDecoder(); targetElement.innerText = '';
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    const chunk = decoder.decode(value); const lines = chunk.split('\n');
                    for (const line of lines) { if (line.trim().startsWith('data: ')) { const d = line.replace('data: ', '').trim(); if (d === '[DONE]') break; try { const j = JSON.parse(d); const c = j.choices[0].delta.content; if (c) { targetElement.innerText += c; document.getElementById('displayArea').scrollTop = document.getElementById('displayArea').scrollHeight; } } catch(e) {} } }
                }
            } catch (e) { targetElement.innerText += e.name === 'AbortError' ? "\n[已中断]" : "\n[错误]: " + e.message; }
        }

        function appendMessage(s, t) { const c = document.getElementById('displayArea'); const wrapper = document.createElement('div'); wrapper.className = 'msg-wrapper flex flex-col ' + (s === 'user' ? 'items-end' : 'items-start'); wrapper.innerHTML = `<div class="${s}-msg"><div class="msg-body">${t}</div></div>`; c.appendChild(wrapper); c.scrollTop = c.scrollHeight; return wrapper; }
        function updateModelDropdowns() { const custom = flowConfig.proxy_models.split(/[,，]/).map(m => m.trim()).filter(m => m); const all = [...Object.keys(DOMESTIC_MAP), ...custom]; ['singleModel', 'modelA', 'modelB'].forEach(id => { const el = document.getElementById(id); el.innerHTML = ''; all.forEach(m => { el.innerHTML += `<option value="${m}">${DOMESTIC_MAP[m] || m.toUpperCase()}</option>`; }); }); }
        
        document.getElementById('userInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('sendBtn').click(); } });
        document.getElementById('newChatBtn').onclick = () => { saveCurrentToHistory(); currentChatId = null; document.getElementById('displayArea').innerHTML = ''; renderHistory(); };
        document.getElementById('openSettings').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('saveSettings').onclick = () => { Object.keys(flowConfig).forEach(id => flowConfig[id] = document.getElementById(id).value.trim()); localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig)); updateModelDropdowns(); document.getElementById('settingsModal').classList.add('hidden'); alert("大脑已激活！"); };
        document.getElementById('clearChatBtn').onclick = () => { if(confirm("抹除当前显示内容？")) document.getElementById('displayArea').innerHTML = ''; };
        
        window.previewPrompt = (k) => { document.getElementById('newPromptName').value = k; document.getElementById('newPromptContent').value = prompts[k]; };
        function renderPromptList() { const l = document.getElementById('promptList'); l.innerHTML = ''; Object.keys(prompts).forEach(k => { l.innerHTML += `<div onclick="previewPrompt('${k}')" class="weapon-card"><span class="text-blue-400 mr-2">✦</span><span class="text-[13px] font-bold">${k}</span></div>`; }); }
        function renderSelect() { const s = document.getElementById('promptSelect'); s.innerHTML = ''; Object.keys(prompts).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`); }
        document.getElementById('addPromptBtn').onclick = () => { const n = document.getElementById('newPromptName').value.trim(); const c = document.getElementById('newPromptContent').value.trim(); if(n && c) { prompts[n] = c; localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); renderPromptList(); renderSelect(); } };
        window.deleteHistory = (id) => { history = history.filter(h => h.id !== id); localStorage.setItem('lingxi_history', JSON.stringify(history)); renderHistory(); };
        
        init();
    </script>
</body>
</html>
