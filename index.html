<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>灵犀 - 妙笔千般意</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --bg-main: #f4f7f9; --bg-sidebar: #1e222d; --accent-blue: #3b82f6; }
        .theme-dark { --bg-main: #111827; }
        .theme-eye { --bg-main: #e8f3e8; }
        .theme-retro { --bg-main: #f4ece0; }
        body { background-color: var(--bg-main); font-family: "PingFang SC", sans-serif; transition: all 0.3s ease; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
        .sidebar { width: 320px; background: var(--bg-sidebar); color: white; box-shadow: 4px 0 20px rgba(0,0,0,0.2); z-index: 50; }
        .weapon-rack-title { font-size: 24px !important; font-weight: 900; text-align: center; color: #3b82f6; margin: 10px 0 20px 0; }
        .msg-wrapper { margin-bottom: 2rem; display: flex; flex-direction: column; }
        .user-msg { background: var(--accent-blue); color: white; padding: 1rem; border-radius: 18px 18px 4px 18px; font-size: 15px; align-self: flex-end; max-width: 85%; }
        .ai-msg { background: white; color: #1e293b; padding: 1.2rem; border-radius: 18px 18px 18px 4px; font-size: 16px; border: 1px solid #e2e8f0; align-self: flex-start; max-width: 95%; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .copy-tag, .export-tag { font-weight: 900; font-size: 11px; margin-top: 8px; opacity: 0.5; cursor: pointer; color: #64748b; margin-right: 15px; user-select: none; }
        .copy-tag:hover, .export-tag:hover { opacity: 1; color: #3b82f6; }
        .pk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; min-height: 400px; margin-bottom: 20px; }
        .pk-column { background: white; border-radius: 20px; border: 2px solid #cbd5e1; display: flex; flex-direction: column; height: 500px; overflow: hidden; }
        .pk-header { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; background: #f8fafc; font-weight: 800; color: #3b82f6; }
        .pk-body { flex: 1; overflow-y: scroll !important; padding: 24px; font-size: 15px; line-height: 1.8; color: #334155; }
        .btn-stop { background: #ef4444 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        /* 历史面板样式 */
        #historyModal { backdrop-filter: blur(10px); }
        .history-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .history-card:hover { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; transform: translateY(-5px); }
        /* 监控与编辑器 */
        .token-counter { background: #1e293b; color: #fbbf24; border: 1px solid #475569; padding: 4px 12px; border-radius: 8px; font-family: monospace; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .editor-container { flex: 1; display: none; background: white; border-right: 1px solid #e2e8f0; position: relative; }
        .editor-active { display: flex !important; }
        .writing-area { width: 100%; height: 100%; padding: 40px; font-size: 18px; line-height: 2; outline: none; resize: none; border: none; font-family: "PingFang SC", serif; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="sidebar flex flex-col">
        <div class="p-8 border-b border-white/5">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-3xl font-black text-blue-400 italic">灵犀</h1>
                <div class="flex gap-3">
                    <button id="exportBtn" title="备份" class="text-xl">💾</button>
                    <button id="importBtn" title="恢复" class="text-xl">📂</button>
                    <input type="file" id="importFile" class="hidden" accept=".json">
                </div>
            </div>
            <p class="text-[12px] text-blue-300 italic">妙笔千般意，灵犀一点通</p>
        </div>
        <div class="flex-1 overflow-y-auto custom-scroll p-6 space-y-8">
            <button id="openHistoryBtn" class="w-full bg-blue-600/20 text-blue-400 border border-blue-500/50 py-4 rounded-2xl font-black text-lg italic hover:bg-blue-600 hover:text-white transition-all mb-4">📜 历史卷轴</button>
            
            <div class="flex bg-black/30 p-1.5 rounded-2xl border border-white/10">
                <button id="modeChat" class="flex-1 py-2 text-[12px] rounded-xl font-bold bg-blue-600 text-white shadow-lg">单人创作</button>
                <button id="modePK" class="flex-1 py-2 text-[12px] rounded-xl text-gray-400">竞技擂台</button>
            </div>

            <section>
                <h3 class="weapon-rack-title">⚔️兵器架⚔️</h3>
                <div id="promptList" class="space-y-2"></div>
                <div class="mt-4 bg-white/5 p-4 rounded-2xl border border-white/10 shadow-inner">
                    <input id="newPromptName" type="text" placeholder="起个名" class="w-full bg-transparent border-b border-white/20 pb-2 text-sm outline-none mb-4 text-white">
                    <textarea id="newPromptContent" placeholder="注入指令..." class="w-full bg-transparent text-sm h-24 outline-none resize-none text-gray-400 custom-scroll"></textarea>
                    <button id="addPromptBtn" class="w-full bg-blue-600 py-3 mt-4 rounded-xl text-[14px] font-black">打造兵器</button>
                </div>
            </section>

            <section class="pb-10">
                <div class="flex justify-between items-center mb-3 px-1"><span class="text-[12px] font-black text-gray-500 uppercase italic">📖 例文参照</span><button onclick="document.getElementById('fileInput').click()" class="text-blue-400 text-[11px] font-bold">+ 上传</button></div>
                <input type="file" id="fileInput" class="hidden" multiple accept=".txt,.docx">
                <div id="sampleLibrary" class="space-y-2"></div>
            </section>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-100 flex items-center px-6 justify-between z-10">
            <div class="flex items-center gap-4">
                <div class="w-1.5 h-6 bg-blue-500 rounded-full"></div>
                <h2 id="workTitle" class="text-lg font-bold text-gray-700 italic">单人创作模式</h2>
                <button id="toggleSpace" class="ml-4 bg-gray-100 hover:bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-xs font-black transition-all border border-blue-100">✍️ 开启分屏创作</button>
                <button id="newChatBtn" class="ml-2 text-blue-500 font-bold text-sm">+ 新开篇</button>
            </div>
            <div class="flex items-center gap-4">
                <div id="tokenWatcher" class="token-counter" title="点击清零">
                    <span id="totalTokens">灵石: 0</span>
                    <span id="totalCost" class="text-[9px] opacity-70">≈ 0.00 元</span>
                </div>
                <div class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100 shadow-sm"><span class="text-[9px] font-bold text-gray-400">🌡️ 灵感</span><input type="range" id="tempSlider" min="0" max="1.5" step="0.1" value="0.7" class="w-16"><span id="tempValue" class="text-[10px] font-mono font-bold text-blue-500 w-4">0.7</span></div>
                <div id="singleSelectBox"><select id="singleModel" class="bg-gray-50 border border-gray-200 py-1.5 px-4 rounded-full text-[12px] font-bold outline-none"></select></div>
                <div id="pkSelectBox" class="hidden flex items-center gap-2 bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100 text-[10px] font-bold text-blue-600">A: <select id="modelA" class="bg-transparent outline-none"></select> B: <select id="modelB" class="bg-transparent outline-none"></select></div>
                <button id="themeToggle" class="text-xl">🎨</button>
                <button id="openSettings" class="text-xl">⚙️</button>
                <button id="clearChatBtn" class="text-xl">🧹</button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div id="mainEditor" class="editor-container">
                <textarea id="workspace" class="writing-area custom-scroll" placeholder="写下你的正文..."></textarea>
                <div class="absolute bottom-4 left-6 text-[10px] text-gray-400 font-black italic tracking-widest">LINGXI CREATIVE SPACE</div>
            </div>
            <div class="flex-1 flex flex-col">
                <main id="displayArea" class="flex-1 overflow-y-auto p-12 custom-scroll"></main>
                <footer class="p-6 bg-white border-t border-gray-100">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex items-center gap-3 mb-3"><span class="text-[11px] font-black text-gray-400 italic">选用兵器:</span><select id="promptSelect" class="bg-blue-50 text-blue-600 py-1 px-4 rounded-xl text-[12px] font-bold border border-blue-100 outline-none"></select></div>
                        <div class="bg-gray-100 border-2 border-gray-200 rounded-[24px] p-2 focus-within:bg-white focus-within:border-blue-500 transition-all shadow-sm">
                            <textarea id="userInput" class="w-full bg-transparent border-none px-5 py-2 text-base outline-none min-h-[80px]" placeholder="在此挥笔..."></textarea>
                            <div class="flex justify-end p-1.5 mt-1 border-t border-gray-100"><button id="sendBtn" class="bg-blue-600 text-white px-10 py-2.5 rounded-xl font-bold shadow-md active:scale-95 transition-all text-sm">开始执行</button></div>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <div id="historyModal" class="hidden fixed inset-0 bg-slate-900/95 z-[100] p-12 overflow-y-auto custom-scroll">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
                <h2 class="text-4xl font-black text-blue-400 italic italic">📜 历史卷轴</h2>
                <button id="closeHistoryBtn" class="text-white text-5xl font-light hover:text-blue-400">×</button>
            </div>
            <div id="historyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur flex items-center justify-center z-50">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-xl shadow-2xl">
            <h3 class="text-xl font-black mb-6 italic text-center">⚙️ 大脑配置</h3>
            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-3"><h4 class="text-[10px] font-black text-green-600 uppercase border-l-4 border-green-500 pl-2">官方</h4><input id="ds_key" type="password" placeholder="DeepSeek Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2 outline-none"><input id="qw_key" type="password" placeholder="Qwen Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2 outline-none"><input id="db_key" type="password" placeholder="豆包 Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2 outline-none"></div>
                <div class="space-y-3"><h4 class="text-[10px] font-black text-purple-600 uppercase border-l-4 border-purple-500 pl-2">中转</h4><input id="proxy_url" type="text" placeholder="Base URL" class="w-full bg-gray-50 border rounded-xl px-4 py-2 outline-none"><input id="proxy_key" type="password" placeholder="Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2 outline-none"><textarea id="proxy_models" placeholder="模型列表..." class="w-full bg-gray-50 border rounded-xl px-4 py-2 text-xs h-16 outline-none"></textarea></div>
            </div>
            <button id="saveSettings" class="w-full bg-blue-600 text-white font-black py-4 mt-8 rounded-2xl shadow-xl">激活</button>
            <button id="closeSettings" class="w-full mt-2 text-gray-400 font-bold">关闭</button>
        </div>
    </div>

    <script>
        const DOMESTIC_MAP = { 'deepseek-chat': '深度求索 V3', 'qwen-plus': '通义千问 Plus' };
        const API_URLS = { 'deepseek-chat': 'https://api.deepseek.com/v1/chat/completions', 'qwen-plus': 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions' };
        let flowConfig = JSON.parse(localStorage.getItem('lingxi_flow')) || { ds_key:'', qw_key:'', db_key:'', proxy_url:'', proxy_key:'', proxy_models:'gpt-4o,claude-3-5-sonnet' };
        let prompts = JSON.parse(localStorage.getItem('lingxi_prompts')) || { "灵犀助手": "你是一个智慧创作助手。" };
        let history = JSON.parse(localStorage.getItem('lingxi_history')) || [];
        let sampleLibrary = JSON.parse(localStorage.getItem('lingxi_samples')) || [];
        let activeSampleIndex = parseInt(localStorage.getItem('lingxi_active_sample')) ?? -1;
        let totalTokens = parseInt(localStorage.getItem('lingxi_tokens')) || 0;
        let isPKMode = false; let currentChatId = null; let abortController = null; let isGenerating = false;

        function init() { 
            renderPromptList(); renderSelect(); updateModelDropdowns(); updateTokenDisplay(); renderSampleLibrary();
            document.getElementById('workspace').value = localStorage.getItem('lingxi_workspace') || '';
            Object.keys(flowConfig).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = flowConfig[id]; });
        }

        // 历史记录控制
        const histModal = document.getElementById('historyModal');
        document.getElementById('openHistoryBtn').onclick = () => { renderHistoryGrid(); histModal.classList.remove('hidden'); };
        document.getElementById('closeHistoryBtn').onclick = () => histModal.classList.add('hidden');
        
        function renderHistoryGrid() {
            const grid = document.getElementById('historyGrid');
            grid.innerHTML = '';
            history.slice().reverse().forEach(chat => {
                const card = document.createElement('div');
                card.className = "history-card p-6 rounded-[24px] cursor-pointer relative group";
                card.onclick = () => { currentChatId = chat.id; document.getElementById('displayArea').innerHTML = chat.content; histModal.classList.add('hidden'); };
                card.innerHTML = `
                    <div class="text-blue-400 font-bold mb-2 truncate pr-6"># ${chat.title}</div>
                    <div class="text-white/40 text-xs font-mono mb-4">${chat.time || '往期'}</div>
                    <div class="text-white/60 text-sm line-clamp-3">${chat.content.replace(/<[^>]*>/g, '').slice(0, 100)}...</div>
                    <button onclick="event.stopPropagation(); deleteH('${chat.id}')" class="absolute top-4 right-4 text-red-500 opacity-0 group-hover:opacity-100 font-black text-xl">×</button>
                `;
                grid.appendChild(card);
            });
        }

        // Token 监控
        function updateTokenDisplay() {
            document.getElementById('totalTokens').innerText = `灵石: ${totalTokens.toLocaleString()}`;
            document.getElementById('totalCost').innerText = `≈ ${(totalTokens / 500000).toFixed(3)} 元`;
            localStorage.setItem('lingxi_tokens', totalTokens);
        }
        document.getElementById('tokenWatcher').onclick = () => { if(confirm("重置灵石？")) { totalTokens = 0; updateTokenDisplay(); } };

        // 分屏控制
        document.getElementById('toggleSpace').onclick = function() {
            const editor = document.getElementById('mainEditor');
            const isActive = editor.classList.toggle('editor-active');
            this.innerText = isActive ? "📔 关闭创作空间" : "✍️ 开启分屏创作";
            this.className = isActive ? "ml-4 bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-black transition-all border border-blue-100 shadow-lg" : "ml-4 bg-gray-100 hover:bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-xs font-black transition-all border border-blue-100";
        };
        document.getElementById('workspace').oninput = (e) => localStorage.setItem('lingxi_workspace', e.target.value);

        // 基础逻辑 (不动产)
        document.getElementById('tempSlider').oninput = (e) => document.getElementById('tempValue').innerText = e.target.value;
        document.getElementById('newChatBtn').onclick = () => { currentChatId = null; document.getElementById('displayArea').innerHTML = ''; document.getElementById('userInput').value = ''; };
        const modeChat = document.getElementById('modeChat'); const modePK = document.getElementById('modePK');
        modeChat.onclick = () => switchMode(false); modePK.onclick = () => switchMode(true);
        function switchMode(pk) { isPKMode = pk; modeChat.className = pk ? "flex-1 py-2 text-[12px] rounded-xl text-gray-400" : "flex-1 py-2 text-[12px] rounded-xl font-bold bg-blue-600 text-white shadow-lg"; modePK.className = !pk ? "flex-1 py-2 text-[12px] rounded-xl text-gray-400" : "flex-1 py-2 text-[12px] rounded-xl font-bold bg-blue-600 text-white shadow-lg"; document.getElementById('singleSelectBox').classList.toggle('hidden', pk); document.getElementById('pkSelectBox').classList.toggle('hidden', !pk); document.getElementById('workTitle').innerText = pk ? "竞技擂台模式" : "单人创作模式"; document.getElementById('displayArea').innerHTML = ''; currentChatId = null; }

        async function streamCallAI(modelName, sys, text, targetElement, temp) {
            let apiUrl = ""; let apiKey = ""; 
            const isDoubao = modelName.startsWith('ep-') || modelName.includes('doubao');
            if (isDoubao) { apiUrl = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions'; apiKey = flowConfig.db_key; }
            else if (modelName === 'deepseek-chat') { apiUrl = API_URLS[modelName]; apiKey = flowConfig.ds_key; }
            else if (modelName === 'qwen-plus') { apiUrl = API_URLS[modelName]; apiKey = flowConfig.qw_key; }
            else { apiUrl = flowConfig.proxy_url.trim().replace(/\/$/, '') + '/chat/completions'; apiKey = flowConfig.proxy_key; }
            try {
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey.trim()}` }, body: JSON.stringify({ model: modelName, messages: [{role:"system", content: sys}, {role:"user", content: text}], stream: true, temperature: temp }), signal: abortController.signal });
                const reader = response.body.getReader(); const decoder = new TextDecoder(); targetElement.innerText = '';
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    const chunk = decoder.decode(value); const lines = chunk.split('\n');
                    for (const line of lines) { if (line.trim().startsWith('data: ')) { 
                        const d = line.replace('data: ', '').trim(); if (d === '[DONE]') break; 
                        try { const j = JSON.parse(d); const c = j.choices[0].delta.content; if (c) { targetElement.innerText += c; targetElement.scrollTop = targetElement.scrollHeight; totalTokens += 1; if(totalTokens % 20 === 0) updateTokenDisplay(); } } catch(e) {} 
                    } }
                }
            } catch (e) { targetElement.innerText += e.name === 'AbortError' ? "\n[已停止]" : "\n[错误]: " + e.message; }
        }

        document.getElementById('sendBtn').onclick = async () => {
            const btn = document.getElementById('sendBtn'); if (isGenerating) { abortController.abort(); isGenerating = false; btn.innerText = "开始执行"; btn.classList.remove('btn-stop'); return; }
            const input = document.getElementById('userInput'); const text = input.value.trim(); if(!text) return;
            const finalFullPrompt = `### 指令 ###\n${prompts[document.getElementById('promptSelect').value]}\n\n### 例文 ###\n${activeSampleIndex !== -1 ? sampleLibrary[activeSampleIndex].text : "无"}\n\n### 任务 ###\n${text}`;
            isGenerating = true; btn.innerText = "停止"; btn.classList.add('btn-stop');
            abortController = new AbortController();
            const display = document.getElementById('displayArea');
            if(isPKMode) {
                const mA = document.getElementById('modelA').value; const mB = document.getElementById('modelB').value;
                const pkGrid = document.createElement('div'); pkGrid.className = "pk-grid";
                const colA = createPKCol(mA); const colB = createPKCol(mB);
                pkGrid.append(colA, colB); display.appendChild(pkGrid);
                await Promise.all([ streamCallAI(mA, "写作专家", finalFullPrompt, colA.querySelector('.pk-body'), parseFloat(tempSlider.value)), streamCallAI(mB, "写作专家", finalFullPrompt, colB.querySelector('.pk-body'), parseFloat(tempSlider.value)) ]);
                addActions(colA.querySelector('.pk-body'), colA.querySelector('.pk-body').innerText); addActions(colB.querySelector('.pk-body'), colB.querySelector('.pk-body').innerText);
            } else {
                const uW = appendMsg('user', text); addActions(uW, text);
                const aW = appendMsg('ai', "...");
                await streamCallAI(document.getElementById('singleModel').value, "写作专家", finalFullPrompt, aW.querySelector('.msg-body'), parseFloat(tempSlider.value));
                addActions(aW, aW.querySelector('.msg-body').innerText);
            }
            isGenerating = false; btn.innerText = "开始执行"; btn.classList.remove('btn-stop'); input.value = ''; saveHistory();
        };

        function createPKCol(mName) { const col = document.createElement('div'); col.className = "pk-column"; col.innerHTML = `<div class="pk-header">${DOMESTIC_MAP[mName] || mName}</div><div class="pk-body custom-scroll"></div>`; return col; }
        function appendMsg(s, t) { const c = document.getElementById('displayArea'); const w = document.createElement('div'); w.className = 'msg-wrapper ' + (s==='user'?'items-end':'items-start'); w.innerHTML = `<div class="${s}-msg"><div class="msg-body">${t}</div></div>`; c.appendChild(w); c.scrollTop = c.scrollHeight; return w; }
        function saveHistory() { const content = document.getElementById('displayArea').innerHTML; if(!content.trim()) return; const now = new Date(); const timeStr = `${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`; if(!currentChatId) { currentChatId = Date.now().toString(); const title = document.querySelector('.user-msg')?.innerText.slice(0, 10) || "新对话"; history.push({ id: currentChatId, title, content, time: timeStr }); } else { const idx = history.findIndex(h => h.id === currentChatId); if(idx !== -1) { history[idx].content = content; history[idx].time = timeStr; } } localStorage.setItem('lingxi_history', JSON.stringify(history)); }
        window.deleteH = (id) => { if(confirm("删除？")) { history = history.filter(h => h.id !== id); localStorage.setItem('lingxi_history', JSON.stringify(history)); renderHistoryGrid(); } };
        function updateModelDropdowns() { const custom = flowConfig.proxy_models.split(/[,，]/).map(m => m.trim()).filter(m => m); const all = [...Object.keys(DOMESTIC_MAP), ...custom]; ['singleModel', 'modelA', 'modelB'].forEach(id => { const el = document.getElementById(id); el.innerHTML = ''; all.forEach(m => { el.innerHTML += `<option value="${m}">${DOMESTIC_MAP[m] || m.toUpperCase()}</option>`; }); }); }
        document.getElementById('exportBtn').onclick = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({prompts, flowConfig, sampleLibrary, totalTokens})], {type: "application/json"})); a.download = "灵犀备份.json"; a.click(); };
        document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
        document.getElementById('importFile').onchange = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (ev) => { const data = JSON.parse(ev.target.result); if(data.prompts) prompts = data.prompts; if(data.flowConfig) flowConfig = data.flowConfig; if(data.sampleLibrary) sampleLibrary = data.sampleLibrary; if(data.totalTokens) totalTokens = data.totalTokens; localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig)); localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary)); init(); alert("导入成功"); }; reader.readAsText(file); };
        function addActions(container, text) { const tags = document.createElement('div'); tags.className = 'flex gap-4'; const btnCopy = document.createElement('div'); btnCopy.className = 'copy-tag'; btnCopy.innerText = '复制'; btnCopy.onclick = () => { navigator.clipboard.writeText(text); btnCopy.innerText = '√'; setTimeout(() => btnCopy.innerText = '复制', 2000); }; const btnWord = document.createElement('div'); btnWord.className = 'export-tag'; btnWord.innerText = '📄 导出Word'; btnWord.onclick = () => { const doc = new docx.Document({ sections: [{ children: text.split('\n').map(l => new docx.Paragraph({ children: [new docx.TextRun({text:l, size:24})] })) }] }); docx.Packer.toBlob(doc).then(b => saveAs(b, `灵犀_${Date.now()}.docx`)); }; tags.append(btnCopy, btnWord); container.appendChild(tags); }
        document.getElementById('fileInput').onchange = async (e) => { for (let file of e.target.files) { if (file.name.endsWith('.docx')) { let content = (await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()})).value; sampleLibrary.push({ name: file.name, text: content }); } else { const reader = new FileReader(); reader.onload = function() { const buffer = reader.result; const uint8 = new Uint8Array(buffer); let text = new TextDecoder('utf-8').decode(uint8); if (text.includes('') || /[\u0000-\u0008]/.test(text)) { text = new TextDecoder('gbk').decode(uint8); } sampleLibrary.push({ name: file.name, text: text }); finalizeSamples(); }; reader.readAsArrayBuffer(file); } } finalizeSamples(); };
        function finalizeSamples() { activeSampleIndex = sampleLibrary.length - 1; localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary)); localStorage.setItem('lingxi_active_sample', activeSampleIndex); renderSampleLibrary(); }
        function renderSampleLibrary() { const container = document.getElementById('sampleLibrary'); container.innerHTML = ''; sampleLibrary.forEach((s, i) => { const isSelected = activeSampleIndex === i; const div = document.createElement('div'); div.className = `p-3 rounded-xl border text-[11px] cursor-pointer mb-1 flex justify-between transition-all ${isSelected ? 'bg-blue-600/20 border-blue-500 text-blue-400 font-black' : 'bg-white/5 border-white/5 text-gray-500'}`; div.onclick = () => { activeSampleIndex = isSelected ? -1 : i; localStorage.setItem('lingxi_active_sample', activeSampleIndex); renderSampleLibrary(); }; div.innerHTML = `<span>${isSelected ? '✅ ' : ''}${s.name}</span><button onclick="event.stopPropagation(); sampleLibrary.splice(${i},1); if(activeSampleIndex===${i})activeSampleIndex=-1; localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary)); renderSampleLibrary();" class="text-red-400">×</button>`; container.appendChild(div); }); }
        document.getElementById('openSettings').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('saveSettings').onclick = () => { Object.keys(flowConfig).forEach(id => { if(document.getElementById(id)) flowConfig[id] = document.getElementById(id).value.trim(); }); localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig)); updateModelDropdowns(); document.getElementById('settingsModal').classList.add('hidden'); alert("配置完成"); };
        document.getElementById('clearChatBtn').onclick = () => { if(confirm("清屏？")) document.getElementById('displayArea').innerHTML = ''; };
        window.previewPrompt = (k) => { document.getElementById('newPromptName').value = k; document.getElementById('newPromptContent').value = prompts[k]; };
        function renderPromptList() { const l = document.getElementById('promptList'); l.innerHTML = ''; Object.keys(prompts).forEach(k => { const isDefault = k === "灵犀助手"; l.innerHTML += `<div onclick="previewPrompt('${k}')" class="bg-white/5 p-3 rounded-xl border border-white/5 flex justify-between items-center group cursor-pointer hover:border-blue-500 transition-all"><span class="text-[14px] font-bold ${isDefault ? 'text-blue-400 italic' : ''}"><span class="text-blue-500 mr-2">✦</span>${k}</span>${!isDefault ? `<button onclick="event.stopPropagation(); delete prompts['${k}']; localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); renderPromptList(); renderSelect();" class="opacity-0 group-hover:opacity-100 text-red-500">×</button>` : ''}</div>`; }); }
        function renderSelect() { const s = document.getElementById('promptSelect'); s.innerHTML = ''; Object.keys(prompts).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`); }
        document.getElementById('addPromptBtn').onclick = () => { const n = document.getElementById('newPromptName').value.trim(); const c = document.getElementById('newPromptContent').value.trim(); if(n && c) { prompts[n] = c; localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); renderPromptList(); renderSelect(); } };
        window.setTheme = (t) => { document.body.className = 'h-screen flex overflow-hidden ' + t; localStorage.setItem('lingxi_theme', t); }; setTheme(localStorage.getItem('lingxi_theme') || '');
        init();
    </script>
</body>
</html>
