<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀 - 智能创作平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-sidebar: #1e222d;
            --accent-blue: #3b82f6;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
            --footer-bg: #ffffff;
        }
        body.theme-dark {
            --bg-main: #0f172a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --card-bg: #1e293b;
            --footer-bg: #1e293b;
        }
        body.theme-eye {
            --bg-main: #f0f9f0;
            --text-primary: #265e26;
            --text-secondary: #4a7c4a;
            --border-color: #d1e7d1;
            --card-bg: #ffffff;
            --footer-bg: #f0f9f0;
        }
        body.theme-retro {
            --bg-main: #fff8e6;
            --text-primary: #8b4513;
            --text-secondary: #a0522d;
            --border-color: #ffdead;
            --card-bg: #ffffff;
            --footer-bg: #fff8e6;
        }
        .sidebar-light { background-color: #ffffff !important; border-right: 1px solid #e2e8f0; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .sidebar-light .sidebar-title  { color: #3b82f6 !important; }
        .sidebar-light .sidebar-sub    { color: rgba(59,130,246,0.5) !important; }
        .sidebar-light .text-gray-200  { color: #475569 !important; }
        .sidebar-light .text-gray-400  { color: #64748b !important; }
        .sidebar-light .text-gray-500  { color: #94a3b8 !important; }
        .sidebar-light .text-blue-300  { color: #3b82f6 !important; }
        .sidebar-light .text-blue-400  { color: #2563eb !important; }
        .sidebar-light .border-white\/5 { border-color: #e2e8f0 !important; }
        .sidebar-light .bg-black\/20   { background-color: #f1f5f9 !important; }
        .sidebar-light .bg-white\/5    { background-color: #f8fafc !important; border-color: #e2e8f0 !important; }
        .sidebar-light .bg-blue-500\/10 { background-color: rgba(59,130,246,0.08) !important; }
        .sidebar-light .bg-blue-500\/20 { background-color: rgba(59,130,246,0.15) !important; }
        .sidebar-light .mode-btn        { color: #475569 !important; }
        .sidebar-light .mode-btn-active { color: #ffffff !important; }
        .sidebar-light .book-item       { background-color: #f8fafc !important; border-color: #e2e8f0 !important; }
        .sidebar-light .book-item-text  { color: #1e293b !important; }
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.2); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(59,130,246,0.4); }
        .sidebar { width: 280px; min-width: 280px; background: var(--bg-sidebar); color: white; z-index: 50; transition: all 0.3s; height: 100vh; }
        .mode-btn { flex: 1; padding: 0.6rem 0; font-size: 14px; font-weight: 900; font-style: italic; transition: all 0.3s; border-radius: 8px; color: #9ca3af; }
        .mode-btn-active { background: #3b82f6; color: white !important; box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .msg-wrapper { margin-bottom: 1.8rem; display: flex; flex-direction: column; }
        .user-msg { background: var(--accent-blue); color: white; padding: 1rem 1.4rem; border-radius: 20px 20px 4px 20px; align-self: flex-end; max-width: 80%; line-height: 1.8; box-shadow: 0 4px 15px rgba(59,130,246,0.2); }
        .ai-msg { background: var(--card-bg); color: var(--text-primary); padding: 1.4rem 1.8rem; border-radius: 20px 20px 20px 4px; border: 1px solid var(--border-color); align-self: flex-start; max-width: 92%; line-height: 1.8; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .msg-body h1,.msg-body h2,.msg-body h3 { font-weight: 800; margin: 0.8em 0 0.4em; }
        .msg-body h1 { font-size: 1.3em; }
        .msg-body h2 { font-size: 1.15em; }
        .msg-body h3 { font-size: 1.05em; }
        .msg-body p  { margin: 0.5em 0; }
        .msg-body ul,.msg-body ol { padding-left: 1.4em; margin: 0.4em 0; }
        .msg-body li { margin: 0.2em 0; }
        .msg-body code { background: rgba(59,130,246,0.1); padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.88em; font-family: monospace; }
        .msg-body pre { background: #1e293b; color: #e2e8f0; padding: 1em; border-radius: 10px; overflow-x: auto; margin: 0.6em 0; }
        .msg-body pre code { background: none; padding: 0; color: inherit; }
        .msg-body blockquote { border-left: 3px solid #3b82f6; padding-left: 0.8em; color: var(--text-secondary); margin: 0.4em 0; }
        .msg-body strong { font-weight: 700; }
        .msg-body hr { border: none; border-top: 1px solid var(--border-color); margin: 0.8em 0; }
        #themeMenu { display: none; position: absolute; right: 16px; top: 60px; background: var(--card-bg); border-radius: 14px; padding: 12px 14px; z-index: 9999; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.12); flex-direction: row; gap: 10px; align-items: center; }
        .theme-dot { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .theme-dot:hover { transform: scale(1.15); border-color: #3b82f6; }
        .theme-dot.classic { background: linear-gradient(135deg,#f8fafc,#e2e8f0); }
        .theme-dot.dark    { background: linear-gradient(135deg,#0f172a,#1e293b); }
        .theme-dot.eye     { background: linear-gradient(135deg,#f0f9f0,#d1e7d1); }
        .theme-dot.retro   { background: linear-gradient(135deg,#fff8e6,#ffdead); }
        .editor-container { flex: 0 0 380px; display: none; background: var(--card-bg); border-right: 1px solid var(--border-color); flex-direction: column; }
        .editor-active { display: flex !important; }
        .writing-area { width: 100%; height: 100%; padding: 32px; font-size: 15px; line-height: 2; outline: none; border: none; background: transparent; color: var(--text-primary); resize: none; }
        header { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); }
        .chat-footer { background: var(--footer-bg); border-top: 1px solid var(--border-color); }
        textarea, input[type="text"], input[type="password"], select { background-color: var(--card-bg) !important; color: var(--text-primary) !important; border-color: var(--border-color) !important; }
        textarea::placeholder, input::placeholder { color: var(--text-secondary) !important; opacity: 0.7; }
        .pill-btn { padding: 0.45rem 1.1rem; border-radius: 9999px; font-size: 0.82rem; font-weight: 700; transition: all 0.25s; background-color: var(--bg-main); color: var(--text-secondary); border: 1px solid var(--border-color); cursor: pointer; }
        .pill-btn:hover { background-color: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59,130,246,0.3); transform: translateY(-1px); }
        #tempValueDisplay { font-family: monospace; font-weight: 900; color: #3b82f6; font-size: 13px; min-width: 28px; text-align: center; }
        .modal-box { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
        .modal-input { background-color: var(--bg-main) !important; color: var(--text-primary) !important; border: 1px solid var(--border-color) !important; border-radius: 12px; padding: 0.6rem 1rem; outline: none; width: 100%; transition: border-color 0.2s; }
        .modal-input:focus { border-color: #3b82f6 !important; }
        .streaming-cursor::after { content: '▌'; animation: blink 0.8s infinite; color: #3b82f6; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .pk-col { flex: 1; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; }
        .pk-col-header { padding: 0.6rem 1rem; background: var(--bg-main); font-size: 11px; font-weight: 800; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); }
        .pk-body { padding: 1rem; font-size: 13px; min-height: 280px; white-space: pre-wrap; color: var(--text-primary); }
        .prompt-card { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 10px; padding: 0.6rem 0.8rem; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .prompt-card:hover { border-color: #3b82f6; background: rgba(59,130,246,0.04); }
        .prompt-card.active-prompt { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
        .book-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.7rem 0.9rem; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .book-card:hover { border-color: rgba(59,130,246,0.5); }
        .quick-tag { padding: 0.3rem 0.8rem; border-radius: 9999px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-secondary); transition: all 0.2s; white-space: nowrap; }
        .quick-tag:hover { background: #3b82f6; color: white; border-color: #3b82f6; }
        #storageBar { height: 3px; border-radius: 9999px; transition: width 0.5s; }

        /* ⚔️ 竞技擂台动画 */
        @keyframes swordFromLeft {
            0%   { left: -120px; opacity: 1; transform: rotate(0deg) scaleX(1); }
            75%  { left: calc(50% - 80px); opacity: 1; transform: rotate(0deg) scaleX(1); }
            82%  { left: calc(50% - 20px); transform: rotate(-15deg) scaleX(0.95); }
            88%  { left: calc(50% - 60px); transform: rotate(10deg) scaleX(1.05); }
            100% { left: calc(50% - 80px); opacity: 0; transform: rotate(5deg) scaleX(1); }
        }
        @keyframes swordFromRight {
            0%   { right: -120px; opacity: 1; transform: rotate(180deg) scaleX(1); }
            75%  { right: calc(50% - 80px); opacity: 1; transform: rotate(180deg) scaleX(1); }
            82%  { right: calc(50% - 20px); transform: rotate(165deg) scaleX(0.95); }
            88%  { right: calc(50% - 60px); transform: rotate(190deg) scaleX(1.05); }
            100% { right: calc(50% - 80px); opacity: 0; transform: rotate(185deg) scaleX(1); }
        }
        @keyframes flashRing {
            0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
            60%  { transform: translate(-50%,-50%) scale(1.8); opacity: 0.8; }
            100% { transform: translate(-50%,-50%) scale(3);   opacity: 0; }
        }
        @keyframes screenShake {
            0%,100% { transform: translate(0,0); }
            15%     { transform: translate(-8px, 4px); }
            30%     { transform: translate(8px, -4px); }
            45%     { transform: translate(-6px, 6px); }
            60%     { transform: translate(6px, -2px); }
            75%     { transform: translate(-3px, 3px); }
        }
        @keyframes sparkFly {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
        }
        @keyframes pkColIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .pk-col-anim { animation: pkColIn 0.5s ease forwards; }
        @keyframes slideFromLeft  { from { transform: translateX(-120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideFromRight { from { transform: translateX(120px);  opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes clashFlash     { 0%{opacity:0;transform:scale(0.5)} 30%{opacity:1;transform:scale(1.4)} 60%{opacity:1;transform:scale(1.1)} 100%{opacity:0;transform:scale(0.8)} }
        @keyframes clashShake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
        .pk-col-left  { animation: slideFromLeft  0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
        .pk-col-right { animation: slideFromRight 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
        .pk-clash-shake { animation: clashShake 0.35s ease 0.45s both; }
        #clashEffect  { pointer-events:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:48px; z-index:100; animation: clashFlash 0.7s ease 0.4s both; }
        /* 拖拽分隔线 */
        #resizer { width: 5px; cursor: col-resize; background: var(--border-color); flex-shrink: 0; transition: background 0.2s; }
        #resizer:hover { background: #3b82f6; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

<!-- 左侧边栏 -->
<div class="sidebar flex flex-col shadow-2xl">
    <div class="p-6 border-b border-white/5 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-blue-400 italic tracking-wider sidebar-title">灵犀</h1>
            <p class="text-[11px] text-blue-300/60 italic mt-1 tracking-widest sidebar-sub">妙笔千般意 灵犀一点通</p>
        </div>
        <button id="sidebarDarkToggle" class="text-xl opacity-60 hover:opacity-100 hover:scale-110 transition cursor-pointer" title="边栏日夜模式">🌞</button>
    </div>
    <div class="flex-1 overflow-y-auto custom-scroll p-5 space-y-6">
        <div class="flex bg-black/20 p-1 rounded-xl border border-white/5 gap-1">
            <button id="modeChat" class="mode-btn mode-btn-active">✍️ 创作</button>
            <button id="modePK"   class="mode-btn">⚔️ 竞技擂台</button>
        </div>
        <section>
            <button id="openPromptModalBtn" class="w-full bg-gradient-to-r from-blue-600/10 to-blue-400/10 hover:from-blue-600 hover:to-blue-500 border border-blue-500/20 hover:border-blue-400 text-blue-300 hover:text-white py-3.5 rounded-xl font-black transition-all duration-300 flex items-center justify-center gap-2 group">
                <span>🗡️ 神兵武库</span>
                <span id="promptCountBadge" class="bg-blue-500/30 group-hover:bg-white/20 px-2 py-0.5 rounded-md text-[10px]">0件</span>
            </button>
        </section>
        <section>
            <div class="flex justify-between items-center mb-2 px-0.5">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">📖 书稿管理</span>
                <button onclick="addNewBook()" class="text-blue-400 text-[10px] font-bold hover:text-blue-300 px-2 py-1 bg-blue-500/10 rounded-lg hover:bg-blue-500/20 transition">+ 新建</button>
            </div>
            <div id="bookLibrary" class="space-y-1.5 max-h-44 overflow-y-auto custom-scroll"></div>
        </section>
        <section class="pb-8">
            <div class="flex justify-between items-center mb-2 px-0.5">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">🧬 例文克隆中心</span>
                <button onclick="document.getElementById('fileImport').click()" class="text-blue-400 text-[10px] font-bold hover:text-blue-300 px-2 py-1 bg-blue-500/10 rounded-lg hover:bg-blue-500/20 transition">+ 导入</button>
            </div>
            <input type="file" id="fileImport" class="hidden" multiple accept=".txt,.docx">
            <div id="sampleLibrary" class="space-y-1.5"></div>
        </section>
    </div>
    <div class="px-4 py-2 border-t border-white/5">
        <div class="flex justify-between items-center mb-1">
            <span class="text-[10px] text-gray-500">本地存储</span>
            <span id="storageText" class="text-[10px] text-gray-500">0MB / 5MB</span>
        </div>
        <div class="w-full bg-white/10 rounded-full h-1">
            <div id="storageBar" class="bg-blue-500 h-1 rounded-full" style="width:0%"></div>
        </div>
    </div>
</div>

<!-- 主内容区 -->
<div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-[66px] flex items-center px-6 justify-between z-10 flex-shrink-0">
        <div class="flex items-center gap-2">
            <button id="toggleSpace" class="pill-btn">✍️ 分屏创作</button>
            <button id="newChatBtn"  class="pill-btn">✨ 新开篇</button>
            <button id="typesetBtn"  class="pill-btn">📝 一键排版</button>
        </div>
        <div class="flex items-center gap-4 relative">
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full border" style="background:var(--bg-main);border-color:var(--border-color)">
                <span class="text-[10px] font-black" style="color:var(--text-secondary)">灵感</span>
                <input type="range" id="tempSlider" min="0" max="1.5" step="0.1" value="0.7" class="w-14 h-1 accent-blue-500 cursor-pointer">
                <span id="tempValueDisplay">0.7</span>
            </div>
            <div id="singleSelectBox">
                <select id="singleModel" class="border py-1.5 px-3 rounded-full text-xs font-bold outline-none cursor-pointer" style="background:var(--bg-main);border-color:var(--border-color);color:var(--text-primary)"></select>
            </div>
            <div id="pkSelectBox" class="hidden flex items-center gap-2 text-xs font-bold text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100">
                A: <select id="modelA" class="bg-transparent outline-none cursor-pointer"></select>
                &nbsp;|&nbsp;
                B: <select id="modelB" class="bg-transparent outline-none cursor-pointer"></select>
            </div>
            <div class="flex items-center gap-3 border-l pl-4" style="border-color:var(--border-color)">
                <button id="themeToggle"  class="text-xl opacity-60 hover:opacity-100 hover:scale-110 transition cursor-pointer" title="更换主题">🎨</button>
                <button id="openSettings" class="text-xl opacity-60 hover:opacity-100 hover:scale-110 transition cursor-pointer" title="配置中心">⚙️</button>
                <button id="clearChatBtn" class="text-xl opacity-60 hover:opacity-100 hover:scale-110 transition cursor-pointer" title="清空对话">🧹</button>
            </div>
            <div id="themeMenu">
                <span class="text-[10px] font-black" style="color:var(--text-secondary)">主题</span>
                <div class="theme-dot classic" onclick="setTheme('')"            title="经典白"></div>
                <div class="theme-dot dark"    onclick="setTheme('theme-dark')"  title="深空黑"></div>
                <div class="theme-dot eye"     onclick="setTheme('theme-eye')"   title="护眼绿"></div>
                <div class="theme-dot retro"   onclick="setTheme('theme-retro')" title="复古黄"></div>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- 草稿区 -->
        <div id="mainEditor" class="editor-container">
            <div class="flex items-center justify-between px-4 py-2 border-b" style="border-color:var(--border-color);background:var(--bg-main)">
                <span class="text-xs font-black" style="color:var(--text-secondary)">✍️ 草稿区</span>
                <div class="flex items-center gap-2">
                    <span id="workspaceWordCount" class="text-xs font-bold text-blue-500">0字</span>
                    <button onclick="saveDraftToBook()" class="text-[11px] font-bold text-green-500 hover:text-white hover:bg-green-500 px-2 py-1 rounded-lg border border-green-300 hover:border-green-500 transition" title="将草稿保存为新书稿">
                        💾 转为新书稿
                    </button>
                    <button id="draftToAIBtn" class="text-[11px] font-bold text-purple-500 hover:text-white hover:bg-purple-500 px-2 py-1 rounded-lg border border-purple-300 hover:border-purple-500 transition" title="将草稿内容发给AI分析">
                        📤 发给AI
                    </button>
                </div>
            </div>
            <textarea id="workspace" class="writing-area custom-scroll flex-1" placeholder="在此自由创作，左侧AI对话不会覆盖这里..."></textarea>
        </div>

        <!-- 拖拽分隔线 -->
        <div id="resizer"></div>

        <!-- 右侧内容区 -->
        <div id="rightPanel" class="flex-1 flex flex-col overflow-hidden" style="min-width:300px;">
            <main id="displayArea" class="flex-1 overflow-y-auto p-8 custom-scroll relative">
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center select-none pointer-events-none">
                    <div class="text-6xl mb-6 opacity-20">✨</div>
                    <h2 class="text-2xl font-black tracking-widest opacity-30 italic mb-4">灵犀一点通</h2>
                    <div class="flex flex-wrap gap-3 justify-center opacity-25 pointer-events-none">
                        <div class="px-4 py-2 rounded-xl border text-xs font-bold" style="border-color:var(--border-color)">🗡️ 选择神兵武库提示词</div>
                        <div class="px-4 py-2 rounded-xl border text-xs font-bold" style="border-color:var(--border-color)">⚡ 使用快捷指令</div>
                        <div class="px-4 py-2 rounded-xl border text-xs font-bold" style="border-color:var(--border-color)">🧬 导入例文提取基因</div>
                        <div class="px-4 py-2 rounded-xl border text-xs font-bold" style="border-color:var(--border-color)">⚔️ 竞技擂台对比模型</div>
                    </div>
                </div>
            </main>

            <footer class="chat-footer p-5 pb-6 flex-shrink-0">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-center gap-2 mb-2.5 flex-wrap">
                        <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-xs" style="background:var(--bg-main);border-color:var(--border-color)">
                            <span class="font-black text-blue-500">⚔️</span>
                            <span class="font-black" style="color:var(--text-secondary)">兵器:</span>
                            <select id="promptSelect" class="bg-transparent font-black outline-none min-w-[100px] max-w-[180px] cursor-pointer text-blue-600 text-xs"></select>
                        </div>
                        <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-xs" style="background:var(--bg-main);border-color:var(--border-color)">

                                <option value="">-- 选择历史 --</option>
                            </select>

                    <!-- 快捷指令标签：默认不激活，点击填入 -->

                        <button class="quick-tag" onclick="fillInput('请优化以上文字的语言表达，使其更加流畅优美')">✨ 润色</button>
                        <button class="quick-tag" onclick="fillInput('请扩写以上内容，增加细节描写和心理活动')">📝 扩写</button>
                        <button class="quick-tag" onclick="fillInput('请增加一段精彩的对话来推进情节发展')">💬 加对话</button>
                        <button class="quick-tag" onclick="fillInput('请帮我分析以上内容的优缺点并给出改进建议')">🔍 分析</button>
                    </div>
                    <div class="relative rounded-[20px] border transition-all shadow-sm focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/10" style="background:var(--card-bg);border-color:var(--border-color)">
                        <textarea id="userInput"
                            class="w-full bg-transparent border-none pl-5 pr-5 pt-4 pb-14 text-[14px] outline-none min-h-[110px] custom-scroll resize-none"
                            placeholder="在此输入情节需求... (Enter发送，Shift+Enter换行)"></textarea>
                        <div class="absolute bottom-3 right-3 flex items-center gap-2">
                            <span id="charCount" class="text-[10px] font-bold" style="color:var(--text-secondary)">0字</span>
                            <button id="sendBtn" class="bg-blue-600 text-white px-5 py-2 rounded-[12px] font-black shadow hover:bg-blue-500 hover:shadow-lg transition-all flex items-center gap-1.5 text-sm active:scale-95">
                                <span>🚀</span> 执行
                            </button>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>
</div>

            <button onclick="exportSystemData()" class="flex-1 font-bold py-2.5 rounded-xl transition text-sm hover:opacity-80" style="background:var(--bg-main);color:var(--text-secondary)">💾 导出备份</button>

<!-- 神兵武库弹窗 -->
<div id="promptModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[200]">
    <div class="modal-box rounded-[24px] p-6 w-full max-w-5xl shadow-2xl flex flex-col" style="height:82vh">
        <div class="flex justify-between items-center mb-4 pb-3 border-b" style="border-color:var(--border-color)">
            <h3 class="text-lg font-black text-blue-500 italic">🗡️ 神兵武库管理</h3>
            <button id="closePromptModal" class="w-8 h-8 rounded-full flex items-center justify-center font-black text-xl transition hover:bg-red-50 hover:text-red-500" style="color:var(--text-secondary)">&times;</button>
        </div>
        <div class="flex-1 flex gap-5 overflow-hidden">
            <div class="w-[36%] flex flex-col rounded-2xl border overflow-hidden" style="border-color:var(--border-color)">
                <div class="px-3 py-2 flex justify-between items-center border-b flex-shrink-0" style="background:var(--bg-main);border-color:var(--border-color)">
                    <span class="text-[11px] font-black" style="color:var(--text-secondary)">📜 库中存根</span>
                    <div class="flex items-center gap-2">
                        <span id="modalListCount" class="text-blue-600 bg-blue-100/50 px-2 py-0.5 rounded-full text-[10px] font-bold">0</span>
                        <button id="addNewPromptBtn" title="新建提示词" class="text-blue-500 hover:text-white hover:bg-blue-500 w-6 h-6 rounded-full flex items-center justify-center font-black text-sm transition">+</button>
                    </div>
                </div>
                <div id="modalPromptList" class="flex-1 overflow-y-auto custom-scroll p-2.5 space-y-1.5"></div>
            </div>
            <div class="flex-1 flex flex-col">
                <div class="flex items-center gap-2 mb-3 flex-shrink-0">
                    <span id="promptEditorIcon" class="text-blue-500 text-base">✨</span>
                    <h4 id="promptEditorTitle" class="text-sm font-black" style="color:var(--text-primary)">锻造新兵器</h4>
                </div>
                <input id="modalPromptName" type="text" placeholder="给这件兵器起个响亮的名字..." class="modal-input mb-3 text-sm font-bold flex-shrink-0">
                <textarea id="modalPromptContent" placeholder="在此注入核心系统指令..." class="modal-input flex-1 resize-none text-sm custom-scroll leading-relaxed" style="min-height:0"></textarea>
                <div class="flex gap-3 mt-3 flex-shrink-0">
                    <button id="savePromptBtn"  class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white font-black py-2.5 rounded-xl shadow transition text-sm">保存入库</button>
                    <button id="resetPromptBtn" class="flex-1 font-bold py-2.5 rounded-xl transition text-sm hover:opacity-70" style="background:var(--bg-main);color:var(--text-secondary)">清空</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const GENE_PROMPT = `作为顶级编辑，请深度解构该文本并生成风格基因报告：
1. 叙事结构与情节逻辑
2. 人物塑造与对话风格
3. 情感张力与写作技法
4. 情绪链路与冲突密度
5. 语言风格与意象特征
请用简洁的语言归纳，便于后续仿写参考。`;

const SK = {
    flow:'lingxi_flow', prompts:'lingxi_prompts', samples:'lingxi_samples',
    history:'lingxi_history', workspace:'lingxi_workspace', theme:'lingxi_theme',
    sidebarDark:'lingxi_sidebar_dark', autoBackup:'lingxi_auto_backup', books:'lingxi_books'
};

let flowConfig          = loadJSON(SK.flow)    || { ds_key:'', qw_key:'', db_key:'', db_model:'', proxy_url:'', proxy_key:'', proxy_models:'' };
let prompts             = loadJSON(SK.prompts) || { "灵犀助手": "你是一位智慧的创作助手，擅长各类文体写作，风格灵活多变，请根据用户需求提供高质量的创作内容。" };
let history             = loadJSON(SK.history) || [];
let sampleLibrary       = loadJSON(SK.samples) || [];
let bookLibrary         = loadJSON(SK.books)   || [];
let conversationHistory = [];
let currentEditingBookId  = null;
let editingOldPromptName  = null;
let selectedSampleIndices = [];
let isGenerating    = false;
let abortController = null;
let autoBackupTimer = null;
let dom = {};

function loadJSON(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
function saveJSON(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch { showToast('⚠️ 存储空间不足，请导出备份后清理'); } }
function debounce(fn, d) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this,a), d); }; }
const debouncedSaveWorkspace = debounce((val) => saveJSON(SK.workspace, val), 600);

function init() {
    cacheDom();
    initTheme();
    initSidebarDarkMode();
    initConfigInputs();
    loadWorkspace();
    renderBookLibrary();
    renderSampleLibrary();
    renderSelect();
    updateModelDropdowns();
    renderHistorySelect();
    updateSidebarPromptBadge();
    checkEmptyState();
    initAutoBackup();
    updateStorageBar();
    bindEvents();
    initResizer();
}

function cacheDom() {
    dom = {
        displayArea:  document.getElementById('displayArea'),
        emptyState:   document.getElementById('emptyState'),
        workspace:    document.getElementById('workspace'),
        userInput:    document.getElementById('userInput'),
        sendBtn:      document.getElementById('sendBtn'),
        tempSlider:   document.getElementById('tempSlider'),
        tempVal:      document.getElementById('tempValueDisplay'),
        themeMenu:    document.getElementById('themeMenu'),
        themeToggle:  document.getElementById('themeToggle'),
        charCount:    document.getElementById('charCount'),
        wsWordCount:  document.getElementById('workspaceWordCount'),
        promptSelect: document.getElementById('promptSelect'),
    };
}

function updateStorageBar() {
    let total = 0;
    for (let k in localStorage) {
        if (localStorage.hasOwnProperty(k)) total += (localStorage[k].length * 2);
    }
    const usedMB = (total / 1024 / 1024).toFixed(2);
    const pct    = Math.min((usedMB / 5) * 100, 100);
    document.getElementById('storageText').textContent = `${usedMB}MB / 5MB`;
    const bar = document.getElementById('storageBar');
    bar.style.width = pct + '%';
    bar.style.background = pct > 80 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#3b82f6';
    if (pct > 80) showToast('⚠️ 本地存储已超80%，建议导出备份并清理历史');
}

function initTheme() {
    applyTheme(localStorage.getItem(SK.theme) || '');
    dom.themeToggle.addEventListener('click', e => {
        e.stopPropagation();
        dom.themeMenu.style.display = dom.themeMenu.style.display === 'flex' ? 'none' : 'flex';
    });
    document.addEventListener('click', () => { dom.themeMenu.style.display = 'none'; });
    dom.themeMenu.addEventListener('click', e => e.stopPropagation());
}
function applyTheme(t) {
    document.body.className = document.body.className.replace(/theme-\S+/g,'').trim();
    document.body.classList.add('h-screen','flex','overflow-hidden');
    if (t) document.body.classList.add(t);
}
window.setTheme = function(t) {
    applyTheme(t);
    localStorage.setItem(SK.theme, t);
    dom.themeMenu.style.display = 'none';
    showToast(`🎨 已切换：${{'':'经典白','theme-dark':'深空黑','theme-eye':'护眼绿','theme-retro':'复古黄'}[t]}`);
};

function initSidebarDarkMode() { setSidebarLight(localStorage.getItem(SK.sidebarDark) === '1'); }
function setSidebarLight(isLight) {
    document.querySelector('.sidebar').classList.toggle('sidebar-light', isLight);
    document.getElementById('sidebarDarkToggle').textContent = isLight ? '🌙' : '🌞';
    localStorage.setItem(SK.sidebarDark, isLight ? '1' : '0');
}
function toggleSidebarDarkMode() { setSidebarLight(!document.querySelector('.sidebar').classList.contains('sidebar-light')); }

function renderBookLibrary() {
    const container = document.getElementById('bookLibrary');
    const fragment  = document.createDocumentFragment();
    bookLibrary.forEach((book, i) => {
        const item = document.createElement('div');
        item.className = 'book-card book-item';
        const left = document.createElement('div');
        left.className = 'book-item-text text-[11px] font-bold truncate flex-1 pr-2';
        left.textContent = `${book.name} (${(book.content||'').length}字)`;
        const btns = document.createElement('div');
        btns.className = 'flex gap-1 flex-shrink-0';
        btns.appendChild(makeBtn('✏️','text-blue-400 hover:bg-blue-500/20', () => editBook(i)));
        btns.appendChild(makeBtn('🗑️','text-red-400 hover:bg-red-500/20',  () => deleteBook(i)));
        item.append(left, btns);
        item.onclick = e => { if (!e.target.closest('button')) editBook(i); };
        fragment.appendChild(item);
    });
    container.innerHTML = '';
    container.appendChild(fragment);
}
window.addNewBook = function() {
    currentEditingBookId = null;
    document.getElementById('bookNameInput').value = `新书稿_${bookLibrary.length+1}`;
    document.getElementById('bookContent').value = '';
    document.getElementById('bookWordCount').textContent = '0';
    document.getElementById('bookModal').classList.remove('hidden');
};
window.editBook = function(i) {
    currentEditingBookId = i;
    document.getElementById('bookNameInput').value = bookLibrary[i].name;
    document.getElementById('bookContent').value   = bookLibrary[i].content || '';
    document.getElementById('bookWordCount').textContent = (bookLibrary[i].content||'').length;
    document.getElementById('bookModal').classList.remove('hidden');
};
window.deleteBook = function(i) {
    if (!confirm(`确认删除【${bookLibrary[i].name}】？`)) return;
    bookLibrary.splice(i,1); saveJSON(SK.books, bookLibrary); renderBookLibrary();
};
window.saveCurrentBook = function() {
    const name    = document.getElementById('bookNameInput').value.trim() || '未命名书稿';
    const content = document.getElementById('bookContent').value;
    if (currentEditingBookId !== null) bookLibrary[currentEditingBookId] = {name,content};
    else bookLibrary.push({name,content});
    saveJSON(SK.books, bookLibrary); renderBookLibrary(); closeBookModal();
    showToast(`✅ 书稿【${name}】已保存`);
};
window.closeBookModal   = function() { document.getElementById('bookModal').classList.add('hidden'); };
window.appendBookToDraft = function() {
    dom.workspace.value += (dom.workspace.value ? '\n\n' : '') + document.getElementById('bookContent').value;
    debouncedSaveWorkspace(dom.workspace.value); showToast('📝 已追加到草稿区');
};
window.saveDraftToBook = function() {
    const draft = dom.workspace.value.trim();
    if (!draft) { showToast('⚠️ 草稿区为空'); return; }
    bookLibrary.push({name:`草稿_${new Date().toLocaleString()}`, content:draft});
    saveJSON(SK.books, bookLibrary); renderBookLibrary(); showToast('💾 草稿已转为新书稿');
};

function typesetContent() {
    let text = dom.workspace.value.trim();
    if (!text) { showToast('⚠️ 草稿区为空'); return; }
    text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    text = text.replace(/([。！？…]+[」"']?)\s*/g,'$1\n');
    text = text.replace(/\n{3,}/g,'\n\n');
    text = text.replace(/[ \t]+/g,' ');
    text = text.split('\n').map(l=>l.trimStart()).join('\n').trim();
    dom.workspace.value = text;
    debouncedSaveWorkspace(text);
    showToast('📝 智能排版完成');
}

function fillInput(text) {
    dom.userInput.value = text;
    dom.userInput.focus();
    dom.charCount.textContent = text.length + '字';
}

function updateSidebarPromptBadge() {
    const c = Object.keys(prompts).length;
    document.getElementById('promptCountBadge').textContent = c + '件';
    const b = document.getElementById('modalListCount');
    if (b) b.textContent = c;
}
function renderModalPromptList() {
    const list = document.getElementById('modalPromptList');
    const frag = document.createDocumentFragment();
    Object.keys(prompts).forEach(name => {
        const item = document.createElement('div');
        item.className = 'prompt-card' + (name === editingOldPromptName ? ' active-prompt' : '');
        const title = document.createElement('span');
        title.className = 'text-xs font-bold truncate flex-1 pointer-events-none';
        title.style.color = 'var(--text-primary)';
        title.textContent = name;
        const btns = document.createElement('div');
        btns.className = 'flex gap-1 ml-2 flex-shrink-0';
        btns.appendChild(makeBtn('✏️','text-blue-500 hover:bg-blue-100/50', () => loadPromptInEditor(name)));
        btns.appendChild(makeBtn('🗑️','text-red-400 hover:bg-red-100/50',  () => deletePrompt(name)));
        item.append(title, btns);
        item.onclick = e => { if (!e.target.closest('button')) loadPromptInEditor(name); };
        frag.appendChild(item);
    });
    list.innerHTML = ''; list.appendChild(frag);
    updateSidebarPromptBadge(); renderSelect();
}
function loadPromptInEditor(name) {
    editingOldPromptName = name;
    document.getElementById('modalPromptName').value    = name;
    document.getElementById('modalPromptContent').value = prompts[name] || '';
    document.getElementById('promptEditorIcon').textContent  = '✏️';
    document.getElementById('promptEditorTitle').textContent = '修改兵器';
    const btn = document.getElementById('savePromptBtn');
    btn.textContent = '保存修改';
    btn.className = btn.className.replace('bg-blue-600','bg-amber-500').replace('hover:bg-blue-500','hover:bg-amber-400');
    renderModalPromptList();
}
function resetPromptEditor() {
    editingOldPromptName = null;
    document.getElementById('modalPromptName').value    = '';
    document.getElementById('modalPromptContent').value = '';
    document.getElementById('promptEditorIcon').textContent  = '✨';
    document.getElementById('promptEditorTitle').textContent = '锻造新兵器';
    const btn = document.getElementById('savePromptBtn');
    btn.textContent = '保存入库';
    btn.className = btn.className.replace('bg-amber-500','bg-blue-600').replace('hover:bg-amber-400','hover:bg-blue-500');
    renderModalPromptList();
}
function savePrompt() {
    const name    = document.getElementById('modalPromptName').value.trim();
    const content = document.getElementById('modalPromptContent').value.trim();
    if (!name || !content) { showToast('⚠️ 名称和内容均不能为空'); return; }
    if (editingOldPromptName && editingOldPromptName !== name) delete prompts[editingOldPromptName];
    prompts[name] = content;
    saveJSON(SK.prompts, prompts);
    showToast(`✨ 兵器【${name}】已锻造完成`);
    resetPromptEditor();
}
window.deletePrompt = function(name) {
    if (Object.keys(prompts).length <= 1) { showToast('⚠️ 至少保留一个提示词'); return; }
    if (!confirm(`确认销毁【${name}】？`)) return;
    delete prompts[name]; saveJSON(SK.prompts, prompts);
    if (editingOldPromptName === name) resetPromptEditor();
    else renderModalPromptList();
};
function renderSelect() {
    const s = dom.promptSelect; if (!s) return;
    const cur = s.value; s.innerHTML = '';
    Object.keys(prompts).forEach(k => {
        const o = document.createElement('option'); o.value = k; o.textContent = k; s.appendChild(o);
    });
    if (cur && prompts[cur]) s.value = cur;
}

function initConfigInputs() {
    ['ds_key','qw_key','db_key','db_model','proxy_url','proxy_key','proxy_models'].forEach(id => {
        document.getElementById(id).value = flowConfig[id] || '';
    });
}
function saveConfig() {
    flowConfig = {};
    ['ds_key','qw_key','db_key','db_model','proxy_url','proxy_key','proxy_models'].forEach(id => {
        flowConfig[id] = document.getElementById(id).value.trim();
    });
    saveJSON(SK.flow, flowConfig);
    updateModelDropdowns();
    showToast('✅ 配置已保存并激活');
    document.getElementById('settingsModal').classList.add('hidden');
}
function updateModelDropdowns() {
    const official = [];
    if (flowConfig.ds_key) { official.push({value:'deepseek-chat',label:'DeepSeek Chat'}); official.push({value:'deepseek-reasoner',label:'DeepSeek R1'}); }
    if (flowConfig.qw_key) { official.push({value:'qwen3.5-plus',label:'Qwen3.5 最新'}); official.push({value:'qwen3.5-flash',label:'Qwen3.5 Flash 极速'}); }
    if (flowConfig.db_key && flowConfig.db_model) official.push({value:flowConfig.db_model, label:`豆包(${flowConfig.db_model.slice(0,10)}...)`});
    const proxy = flowConfig.proxy_models ? flowConfig.proxy_models.split(',').map(s=>s.trim()).filter(Boolean).map(m=>({value:m,label:m})) : [];
    const all = [...official, ...proxy];
    if (!all.length) all.push({value:'deepseek-chat',label:'DeepSeek(请先配置Key)'});
    ['singleModel','modelA','modelB'].forEach(id => {
        const el = document.getElementById(id), cur = el.value;

        if (cur && all.find(m=>m.value===cur)) el.value = cur;
    });
}

async function streamCallAI(model, sysPrompt, messages, targetEl, temp) {
    let url, key;
    if (model === 'deepseek-chat' || model === 'deepseek-reasoner') {
        url = 'https://api.deepseek.com/chat/completions';
        key = flowConfig.ds_key;
    } else if (model.startsWith('qwen')) {
        url = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
        key = flowConfig.qw_key;
    } else if (model.startsWith('ep-') || model.startsWith('doubao')) {
        url = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';
        key = flowConfig.db_key;
    } else {
        if (!flowConfig.proxy_url) {
            targetEl.innerHTML = '<span style="color:#ef4444">⚠️ 未配置中转 Base URL，请前往 ⚙️ 配置中心填写</span>';
            return;
        }
        url = flowConfig.proxy_url.replace(/\/+$/,'') + '/chat/completions';
        key = flowConfig.proxy_key;
    }
    if (!key || !key.trim()) {
        targetEl.innerHTML = `<span style="color:#ef4444">⚠️ 模型【${model}】未配置 API Key，请前往 ⚙️ 配置中心填写</span>`;
        return;
    }
    const safeTemp = Math.min(Math.max(parseFloat(temp)||0.7, 0), 1.5);
    const msgArray = Array.isArray(messages) ? messages : [{ role:'user', content:messages }];
    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${key.trim()}` },
            body: JSON.stringify({
                model,
                messages: [{ role:'system', content:sysPrompt }, ...msgArray],
                stream: true,
                temperature: safeTemp
            }),
            signal: abortController ? abortController.signal : undefined
        });
        if (!res.ok) {
            const err = await res.text();
            targetEl.innerHTML = `<span style="color:#ef4444">❌ 请求失败 (${res.status})：${err.slice(0,200)}</span>`;
            return;
        }
        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let rawText = '';
        targetEl.textContent = '';
        targetEl.classList.add('streaming-cursor');
        while (true) {
            const {done,value} = await reader.read();
            if (done) break;
            const lines = decoder.decode(value,{stream:true}).split('\n');
            for (const line of lines) {
                const l = line.trim();
                if (!l.startsWith('data: ')) continue;
                const s = l.slice(6);
                if (s === '[DONE]') break;
                try {
                    const c = JSON.parse(s)?.choices?.[0]?.delta?.content;
                    if (c) { rawText += c; targetEl.textContent = rawText; dom.displayArea.scrollTop = dom.displayArea.scrollHeight; }
                } catch {}
            }
        }
        targetEl.classList.remove('streaming-cursor');
        targetEl.innerHTML = marked.parse(rawText);
        dom.displayArea.scrollTop = dom.displayArea.scrollHeight;
    } catch(e) {
        targetEl.classList.remove('streaming-cursor');
        if (e.name === 'AbortError') targetEl.innerHTML += '<br><span style="color:#94a3b8;font-size:12px">⏹️ 已停止生成</span>';
        else targetEl.innerHTML = `<span style="color:#ef4444">❌ 网络错误：${e.message}</span>`;
    }
}

async function handleSend() {
    if (isGenerating) { if (abortController) abortController.abort(); return; }
    const text = dom.userInput.value.trim();
    if (!text) { showToast('⚠️ 请先输入内容'); return; }
    let ref = '';
    selectedSampleIndices.forEach(idx => {
        const s = sampleLibrary[idx];
        if (s) ref += `\n【参考《${s.name}》风格】\n${s.gene || s.text.slice(0,1000)}\n`;
    });
    const sys        = prompts[dom.promptSelect.value] || '你是一个智慧的创作助手。';
    const fullPrompt = ref ? `${ref}\n---\n### 任务指令\n${text}` : text;
    const isPK       = !document.getElementById('pkSelectBox').classList.contains('hidden');
    isGenerating = true; abortController = new AbortController(); setSendButtonStop();
    try {
        if (isPK) await handlePKMode(sys, fullPrompt);
        else      await handleSingleMode(text, sys, fullPrompt);
    } finally {
        isGenerating = false; abortController = null; resetSendButton();
        dom.userInput.value = ''; dom.charCount.textContent = '0字';
        saveHistory(); renderHistorySelect(); updateStorageBar();
    }
}

async function handlePKMode(sys, prompt) {

    ]);

    addMsgActions(colB, colB.querySelector('.pk-body').innerText);

function playSwordClash() {
    return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0);pointer-events:none;overflow:hidden;';
        document.body.appendChild(overlay);

        const swordL = document.createElement('div');
        swordL.style.cssText = 'position:fixed;top:50%;left:-120px;transform:translateY(-50%);font-size:72px;z-index:10000;pointer-events:none;line-height:1;filter:drop-shadow(0 0 8px rgba(255,200,50,0.8));';
        swordL.textContent = '🗡️';
        document.body.appendChild(swordL);

        const swordR = document.createElement('div');
        swordR.style.cssText = 'position:fixed;top:50%;right:-120px;transform:translateY(-50%) scaleX(-1);font-size:72px;z-index:10000;pointer-events:none;line-height:1;filter:drop-shadow(0 0 8px rgba(255,200,50,0.8));';
        swordR.textContent = '🗡️';
        document.body.appendChild(swordR);

        const centerX = window.innerWidth  / 2;
        const duration = 800;
        let start = null;

        function flyIn(ts) {
            if (!start) start = ts;
            const p = Math.min((ts - start) / duration, 1);
            const e = p < 0.5 ? 8*p*p*p*p : 1 - Math.pow(-2*p+2, 4)/2;
            const targetL = centerX - 80;
            const targetR = window.innerWidth - centerX - 80;
            swordL.style.left  = (-120 + e * (targetL + 120)) + 'px';
            swordR.style.right = (-120 + e * (targetR + 120)) + 'px';
            if (p < 1) {
                requestAnimationFrame(flyIn);
            } else {
                triggerClash();
            }
        }
        requestAnimationFrame(flyIn);

        function triggerClash() {
            // 屏幕震动
            document.body.style.animation = 'screenShake 0.4s ease';
            setTimeout(() => { document.body.style.animation = ''; }, 400);

            // 闪光圈
            const ring = document.createElement('div');
            ring.style.cssText = 'position:fixed;left:50%;top:50%;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.95) 0%,rgba(255,200,50,0.6) 50%,transparent 70%);z-index:10001;pointer-events:none;animation:flashRing 0.6s ease forwards;';
            document.body.appendChild(ring);

            // 碰撞符号
            const boom = document.createElement('div');
            boom.style.cssText = 'position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:56px;z-index:10002;pointer-events:none;animation:flashRing 0.8s ease forwards;';
            boom.textContent = '💥';
            document.body.appendChild(boom);

            // 火花粒子
            const colors = ['#FFD700','#FF6B00','#FF3300','#FFF700','#FFFFFF','#FF9500'];
            for (let i = 0; i < 28; i++) {
                const spark = document.createElement('div');
                const angle = (Math.PI * 2 / 28) * i + (Math.random() - 0.5) * 0.4;
                const dist  = 80 + Math.random() * 140;
                const sx    = Math.cos(angle) * dist;
                const sy    = Math.sin(angle) * dist;
                const size  = 4 + Math.random() * 8;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const delay = Math.random() * 0.15;
                const dur   = 0.5 + Math.random() * 0.6;
                spark.style.cssText = `position:fixed;left:calc(50% + ${(Math.random()-0.5)*20}px);top:calc(50% + ${(Math.random()-0.5)*20}px);width:${size}px;height:${size}px;border-radius:50%;background:${color};box-shadow:0 0 ${size*2}px ${color};z-index:10001;pointer-events:none;--sx:${sx}px;--sy:${sy}px;animation:sparkFly ${dur}s ease ${delay}s forwards;`;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), (dur + delay) * 1000 + 100);
            }

            // 音效
            try {
                const ctx  = new (window.AudioContext || window.webkitAudioContext)();
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
            } catch {}

            // 剑弹开淡出
            setTimeout(() => {
                swordL.style.transition = 'all 0.4s ease';
                swordR.style.transition = 'all 0.4s ease';
                swordL.style.left    = (centerX - 180) + 'px';
                swordR.style.right   = (window.innerWidth - centerX - 180) + 'px';
                swordL.style.opacity = '0';
                swordR.style.opacity = '0';
            }, 200);

            // 3秒后清理所有元素，开始生成
            setTimeout(() => {
                [swordL, swordR, ring, boom, overlay].forEach(el => {
                    if (el && el.parentNode) el.remove();
                });
                resolve();
            }, 3000);
        }
    });
}

async function handleFileImport(e) {
    const files = e.target.files; if (!files||!files.length) return;
    let imported = 0;
    for (const f of files) {
        try {
            let text = f.name.endsWith('.docx')
                ? await new Promise((res,rej) => { const r=new FileReader(); r.onload=ev=>mammoth.extractRawText({arrayBuffer:ev.target.result}).then(x=>res(x.value)).catch(rej); r.readAsArrayBuffer(f); })
                : await f.text();
            if (text.trim()) { sampleLibrary.push({name:f.name,text,gene:''}); imported++; }
        } catch { showToast(`⚠️ 导入 ${f.name} 失败`); }
    }
    if (imported) { saveJSON(SK.samples,sampleLibrary); renderSampleLibrary(); showToast(`✅ 成功导入 ${imported} 个文件`); }
    e.target.value = '';
}

function appendMsg(role, content) {
    const wrap = document.createElement('div'); wrap.className = 'msg-wrapper';
    const msg  = document.createElement('div'); msg.className  = role==='user' ? 'user-msg' : 'ai-msg';
    const body = document.createElement('div'); body.className = 'msg-body';
    if (role === 'user') body.textContent = content;
    else body.innerHTML = content ? marked.parse(content) : '';
    msg.appendChild(body); wrap.appendChild(msg);
    dom.displayArea.appendChild(wrap); checkEmptyState();
    dom.displayArea.scrollTop = dom.displayArea.scrollHeight;
    return wrap;
}

    const btnAppend  = makeActionBtn('✍️ 追加草稿','text-purple-500', () => { dom.workspace.value+=(dom.workspace.value?'\n\n':'')+rawText; debouncedSaveWorkspace(dom.workspace.value); if(!document.getElementById('mainEditor').classList.contains('editor-active')) document.getElementById('mainEditor').classList.add('editor-active'); showToast('📝 已追加到草稿区'); });
    const btnContinue= makeActionBtn('➡️ 续写','text-teal-500',   () => { fillInput('请继续往下写，保持完全相同的风格、人物设定和情节走向，不要重复已写内容。'); showToast('💡 续写指令已填入'); });
    const btnRegen   = makeActionBtn('🔄 重新生成','text-orange-500', async () => {
        if (isGenerating) return;
        if (!conversationHistory.length) { showToast('⚠️ 没有可重新生成的内容'); return; }
        const lastUser = conversationHistory.filter(m=>m.role==='user').slice(-1)[0];
        if (!lastUser) return;
        if (conversationHistory[conversationHistory.length-1].role === 'assistant') conversationHistory.pop();
        const allW = dom.displayArea.querySelectorAll('.msg-wrapper');
        if (allW.length) allW[allW.length-1].remove();
        isGenerating=true; abortController=new AbortController(); setSendButtonStop();
        try {
            const sys = prompts[dom.promptSelect.value] || '你是一个智慧的创作助手。';
            conversationHistory.push({role:'user', content:lastUser.content});
            const wrapper=appendMsg('ai',''); const targetEl=wrapper.querySelector('.msg-body');
            await streamCallAI(document.getElementById('singleModel').value, sys, conversationHistory, targetEl, parseFloat(dom.tempSlider.value));
            const aiReply=targetEl.innerText;
            conversationHistory.push({role:'assistant', content:aiReply});
            addMsgActions(wrapper.querySelector('.ai-msg'), aiReply);

function importSystemData(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            if (data.flowConfig)    flowConfig    = data.flowConfig;
            if (data.prompts)       prompts       = data.prompts;
            if (data.sampleLibrary) sampleLibrary = data.sampleLibrary;
            if (data.history)       history       = data.history;
            if (data.books)         bookLibrary   = data.books;
            saveAllData();
            if (data.workspace !== undefined) dom.workspace.value = data.workspace;
            refreshUI(); showToast('✅ 备份导入成功');
        } catch { showToast('❌ 导入失败，文件格式不正确'); }
    };
    reader.readAsText(file); e.target.value = '';
}

}
function setSendButtonStop() {
    dom.sendBtn.innerHTML = `<svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg> 停止`;
    dom.sendBtn.classList.replace('bg-blue-600','bg-red-500');
    dom.sendBtn.classList.replace('hover:bg-blue-500','hover:bg-red-400');
}
function resetSendButton() {
    dom.sendBtn.innerHTML = '<span>🚀</span> 执行';
    dom.sendBtn.classList.replace('bg-red-500','bg-blue-600');
    dom.sendBtn.classList.replace('hover:bg-red-400','hover:bg-blue-500');
}
function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);background:rgba(30,41,59,0.95);color:white;padding:8px 18px;border-radius:999px;z-index:9999;font-size:12px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.2);backdrop-filter:blur(8px);transition:opacity 0.5s;pointer-events:none;';
    t.textContent = msg; document.body.appendChild(t);
    setTimeout(()=>t.style.opacity='0', 2200); setTimeout(()=>t.remove(), 2700);
}
function makeBtn(icon, cls, onClick) {
    const btn = document.createElement('button');
    btn.className = `${cls} p-1 rounded-md transition text-sm`;
    btn.innerHTML = icon; btn.onclick = e => { e.stopPropagation(); onClick(); };
    return btn;
}
function switchToChatMode() {
    document.getElementById('modeChat').classList.add('mode-btn-active');
    document.getElementById('modePK').classList.remove('mode-btn-active');
    document.getElementById('singleSelectBox').classList.remove('hidden');
    document.getElementById('pkSelectBox').classList.add('hidden');
}
function switchToPKMode() {
    document.getElementById('modePK').classList.add('mode-btn-active');
    document.getElementById('modeChat').classList.remove('mode-btn-active');
    document.getElementById('singleSelectBox').classList.add('hidden');
    document.getElementById('pkSelectBox').classList.remove('hidden');
    // 按钮震动提示
    const btn = document.getElementById('modePK');
    btn.style.transform = 'scale(1.08)';
    setTimeout(() => { btn.style.transform = ''; }, 200);
}

// ─── 拖拽分隔线 ───
function initResizer() {
    const resizer = document.getElementById('resizer');
    const editor  = document.getElementById('mainEditor');
    if (!resizer || !editor) return;
    let startX, startW;
    resizer.addEventListener('mousedown', function(e) {
        startX = e.clientX;
        startW = editor.offsetWidth;
        document.body.style.cursor     = 'col-resize';
        document.body.style.userSelect = 'none';
        function onMove(e) {
            const newW = Math.max(200, Math.min(startW + (e.clientX - startX), window.innerWidth - 400));
            editor.style.flex  = 'none';
            editor.style.width = newW + 'px';
        }
        function onUp() {
            document.body.style.cursor     = '';
            document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup',   onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
    });
}

// ─── 事件绑定 ───
function bindEvents() {
    dom.sendBtn.onclick    = handleSend;
    dom.userInput.onkeydown = e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); handleSend(); } };
    dom.userInput.oninput  = () => { dom.charCount.textContent = dom.userInput.value.length+'字'; };
    dom.workspace.oninput  = () => { dom.wsWordCount.textContent=dom.workspace.value.length+'字'; debouncedSaveWorkspace(dom.workspace.value); };
    dom.tempSlider.oninput = () => { dom.tempVal.textContent = dom.tempSlider.value; };

    document.getElementById('toggleSpace').onclick  = () => document.getElementById('mainEditor').classList.toggle('editor-active');
    document.getElementById('newChatBtn').onclick   = () => { clearChat(); dom.userInput.value=''; conversationHistory=[]; showToast('✨ 已开启新篇章，对话记忆已重置'); };
    document.getElementById('typesetBtn').onclick   = typesetContent;
    document.getElementById('clearChatBtn').onclick = clearChat;
    document.getElementById('modeChat').onclick     = switchToChatMode;
    document.getElementById('modePK').onclick       = switchToPKMode;
    document.getElementById('sidebarDarkToggle').onclick = toggleSidebarDarkMode;

    document.getElementById('openSettings').onclick  = () => document.getElementById('settingsModal').classList.remove('hidden');
    document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
    document.getElementById('saveSettings').onclick  = saveConfig;

    document.getElementById('openPromptModalBtn').onclick = () => { renderModalPromptList(); resetPromptEditor(); document.getElementById('promptModal').classList.remove('hidden'); };
    document.getElementById('closePromptModal').onclick   = () => document.getElementById('promptModal').classList.add('hidden');
    document.getElementById('savePromptBtn').onclick      = savePrompt;
    document.getElementById('resetPromptBtn').onclick     = resetPromptEditor;
    document.getElementById('addNewPromptBtn').onclick    = resetPromptEditor;

    document.getElementById('draftToAIBtn').onclick = () => {
        const draft = dom.workspace.value.trim();
        if (!draft) { showToast('⚠️ 草稿区为空'); return; }
        dom.userInput.value = `请帮我分析并优化以下内容：\n\n${draft.slice(0,2000)}`;
        dom.charCount.textContent = dom.userInput.value.length + '字';
        dom.userInput.focus();
        showToast('📤 草稿已填入输入框，可直接执行');
    };

    document.getElementById('fileImport').onchange        = handleFileImport;
    document.getElementById('importSystemInput').onchange = importSystemData;
    document.getElementById('historySelect').onchange     = loadHistory;
    document.getElementById('deleteHistoryBtn').onclick   = () => {
        const idx = document.getElementById('historySelect').value;
        if (idx === '') { showToast('⚠️ 请先选择要删除的历史记录'); return; }
        deleteHistory(parseInt(idx));
    };
}

window.onload = init;
</script>
