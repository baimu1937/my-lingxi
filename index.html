<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>灵犀 v32.7 - 神兵武库版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --bg-main: #f4f7f9; --bg-sidebar: #1e222d; --accent-blue: #3b82f6; }
        .theme-dark { --bg-main: #111827; }
        .theme-eye { --bg-main: #e8f3e8; }
        .theme-retro { --bg-main: #f4ece0; }
        body { background-color: var(--bg-main); font-family: "PingFang SC", sans-serif; transition: all 0.3s ease; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
        .sidebar { width: 300px; background: var(--bg-sidebar); color: white; z-index: 50; }
        
        .mode-btn { flex: 1; padding-top: 0.75rem; padding-bottom: 0.75rem; font-size: 16px !important; font-weight: 900; font-style: italic; transition: all 0.3s; border-radius: 12px; }
        .mode-btn-active { background: #3b82f6; color: white; box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        
        .msg-wrapper { margin-bottom: 2rem; display: flex; flex-direction: column; }
        .user-msg { background: var(--accent-blue); color: white; padding: 1rem; border-radius: 18px 18px 4px 18px; align-self: flex-end; max-width: 85%; }
        .ai-msg { background: white; color: #1e293b; padding: 1.5rem; border-radius: 18px 18px 18px 4px; border: 1px solid #e2e8f0; align-self: flex-start; max-width: 95%; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        
        /* 调色盘菜单 */
        #themeMenu { display: none; position: absolute; right: 40px; top: 60px; background: white; border-radius: 12px; padding: 10px; z-index: 100; border: 1px solid #eee; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-direction: row; gap: 0.75rem; }
        .theme-dot { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; }
        
        .editor-container { flex: 1; display: none; background: white; border-right: 1px solid #e2e8f0; }
        .editor-active { display: flex !important; }
        .writing-area { width: 100%; height: 100%; padding: 40px; font-size: 18px; line-height: 2; outline: none; border: none; }
        
        #tempValueDisplay { font-family: monospace; font-weight: 900; color: #3b82f6; font-size: 14px; min-width: 25px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="sidebar flex flex-col">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-3xl font-black text-blue-400 italic">灵犀</h1>
            <p id="slogan" class="text-[12px] text-blue-300 italic mt-1">妙笔千般意，灵犀一点通</p>
        </div>
        
        <div class="flex-1 overflow-y-auto custom-scroll p-6 space-y-8">
            <div class="flex bg-black/30 p-1.5 rounded-2xl border border-white/10">
                <button id="modeChat" class="mode-btn mode-btn-active">单人创作</button>
                <button id="modePK" class="mode-btn text-gray-400">竞技擂台</button>
            </div>

            <section class="mb-4">
                <button id="openPromptModalBtn" class="w-full bg-white/5 hover:bg-blue-600 border border-white/10 hover:border-blue-500 text-blue-300 hover:text-white py-4 rounded-2xl font-black transition-all shadow-sm flex items-center justify-center gap-3 group">
                    <span class="text-lg">🗡️ 神兵武库</span>
                    <span id="promptCountBadge" class="bg-blue-500/30 group-hover:bg-white/20 px-2.5 py-1 rounded-full text-[11px]">0件</span>
                </button>
            </section>

            <section class="pb-10">
                <div class="flex justify-between items-center mb-3 px-1">
                    <span class="text-[11px] font-black text-gray-500 uppercase italic">📖 例文克隆中心</span>
                    <button onclick="document.getElementById('fileInput').click()" class="text-blue-400 text-[11px] font-bold hover:text-blue-300 transition">+ 导入</button>
                </div>
                <input type="file" id="fileInput" class="hidden" multiple accept=".txt,.docx">
                <div id="sampleLibrary" class="space-y-2"></div>
            </section>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-100 flex items-center px-8 justify-between z-10">
            <div class="flex items-center gap-4">
                <div class="w-1.5 h-6 bg-blue-500 rounded-full"></div>
                <h2 id="workTitle" class="text-lg font-bold text-gray-700 italic">单人创作模式</h2>
                <button id="toggleSpace" class="bg-gray-100 hover:bg-blue-50 text-blue-600 px-6 py-2 rounded-full text-sm font-black transition-all border border-blue-100 shadow-sm">✍️ 分屏创作</button>
                <button id="newChatBtn" class="text-blue-500 font-black text-sm px-4 py-2 hover:bg-gray-50 rounded-lg transition">+ 新开篇</button>
                
                <div class="w-px h-5 bg-gray-200 mx-2"></div>
                
                <button onclick="document.getElementById('importSystemInput').click()" class="text-amber-600 hover:bg-amber-50 font-black text-sm px-3 py-2 rounded-lg transition-all" title="导入神兵档案 JSON">📂 导入</button>
                <button id="exportSystemBtn" class="bg-amber-100 hover:bg-amber-200 text-amber-700 font-black text-sm px-3 py-2 rounded-lg transition-all shadow-sm" title="导出全量备份 JSON">💾 导出</button>
                <input type="file" id="importSystemInput" class="hidden" accept=".json">
            </div>
            
            <div class="flex items-center gap-5 relative">
                <div class="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-full border border-gray-100">
                    <span class="text-[10px] font-black text-gray-400">🌡️ 灵感</span>
                    <input type="range" id="tempSlider" min="0" max="1.5" step="0.1" value="0.7" class="w-16 h-1 accent-blue-500">
                    <span id="tempValueDisplay">0.7</span>
                </div>
                
                <div id="singleSelectBox"><select id="singleModel" class="bg-gray-50 border border-gray-200 py-2 px-4 rounded-full text-xs font-bold outline-none"></select></div>
                <div id="pkSelectBox" class="hidden flex items-center gap-2 text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                    A: <select id="modelA" class="bg-transparent outline-none"></select> | B: <select id="modelB" class="bg-transparent outline-none"></select>
                </div>
                
                <button id="themeToggle" class="text-2xl hover:scale-110 transition cursor-pointer">🎨</button>
                <div id="themeMenu">
                    <div onclick="setTheme('')" class="theme-dot bg-white" title="经典"></div>
                    <div onclick="setTheme('theme-dark')" class="theme-dot bg-gray-800" title="深空"></div>
                    <div onclick="setTheme('theme-eye')" class="theme-dot bg-green-100" title="护眼"></div>
                    <div onclick="setTheme('theme-retro')" class="theme-dot bg-orange-100" title="复古"></div>
                </div>
                
                <button id="openSettings" class="text-xl hover:scale-110 transition">⚙️</button>
                <button id="clearChatBtn" class="text-xl hover:scale-110 transition">🧹</button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div id="mainEditor" class="editor-container">
                <textarea id="workspace" class="writing-area custom-scroll" placeholder="在此开始您的仿写正文..."></textarea>
            </div>
            
            <div class="flex-1 flex flex-col bg-[#f8fafc]">
                <main id="displayArea" class="flex-1 overflow-y-auto p-10 custom-scroll"></main>
                
                <footer class="p-6 bg-white border-t border-gray-100">
                    <div class="max-w-5xl mx-auto">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100">
                                <span class="text-[11px] font-black text-blue-500">⚔️ 选用兵器:</span>
                                <select id="promptSelect" class="bg-transparent text-blue-700 text-sm font-black outline-none min-w-[120px] max-w-[200px] truncate"></select>
                            </div>
                            <div class="flex items-center gap-2 bg-amber-50 px-4 py-2 rounded-2xl border border-amber-100">
                                <span class="text-[11px] font-black text-amber-600">📜 历史记录:</span>
                                <select id="historySelect" class="bg-transparent text-amber-700 text-sm font-black outline-none min-w-[200px]">
                                    <option value="">-- 点击选择回溯 --</option>
                                </select>
                            </div>
                        </div>

                        <div class="relative bg-gray-100 border-2 border-gray-200 rounded-[30px] p-2 focus-within:bg-white focus-within:border-blue-500 transition-all shadow-sm">
                            <textarea id="userInput" class="w-full bg-transparent border-none px-6 py-3 text-base outline-none min-h-[100px] custom-scroll" placeholder="在此输入情节需求... (Enter键执行)"></textarea>
                            <div class="flex justify-end p-2"><button id="sendBtn" class="bg-blue-600 text-white px-12 py-3 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all">开始执行</button></div>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-[200]">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-xl shadow-2xl">
            <h3 class="text-xl font-black mb-8 text-center border-b pb-4">⚙️ 配置大脑</h3>
            <div class="grid grid-cols-2 gap-10">
                <div class="space-y-4 text-sm"><h4 class="text-xs font-black text-green-600 border-l-4 border-green-500 pl-2 uppercase">官方直连</h4><input id="ds_key" type="password" placeholder="DeepSeek Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2.5 outline-none"><input id="qw_key" type="password" placeholder="Qwen Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2.5 outline-none"><input id="db_key" type="password" placeholder="豆包 Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2.5 outline-none"></div>
                <div class="space-y-4 text-sm"><h4 class="text-xs font-black text-purple-600 border-l-4 border-purple-500 pl-2 uppercase">中转及其他</h4><input id="proxy_url" type="text" placeholder="Base URL" class="w-full bg-gray-50 border rounded-xl px-4 py-2.5 outline-none"><input id="proxy_key" type="password" placeholder="中转 Key" class="w-full bg-gray-50 border rounded-xl px-4 py-2.5 outline-none"><textarea id="proxy_models" placeholder="模型名..." class="w-full bg-gray-50 border rounded-xl px-4 py-2 text-xs h-20 outline-none"></textarea></div>
            </div>
            <div class="flex gap-4 mt-10"><button id="saveSettings" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl">激活大脑</button><button id="closeSettings" class="flex-1 bg-gray-100 font-bold py-4 rounded-2xl text-gray-500">关闭</button></div>
        </div>
    </div>

    <div id="promptModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-[200]">
        <div class="bg-white rounded-[30px] p-8 w-full max-w-5xl shadow-2xl flex flex-col h-[85vh]">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-black text-blue-600 italic">🗡️ 神兵武库</h3>
                <button id="closePromptModal" class="text-gray-400 hover:text-red-500 font-black text-2xl transition-colors">×</button>
            </div>
            
            <div class="flex-1 flex gap-6 overflow-hidden">
                <div class="w-1/3 flex flex-col bg-gray-50 rounded-2xl border border-gray-200 overflow-hidden shadow-inner">
                    <div class="p-4 bg-gray-100 border-b border-gray-200 text-sm font-black text-gray-600 flex justify-between items-center">
                        <span>📜 已收录兵器</span>
                        <span id="modalListCount" class="text-blue-500 bg-blue-100 px-2 py-0.5 rounded-full text-[10px]">0</span>
                    </div>
                    <div id="modalPromptList" class="flex-1 overflow-y-auto custom-scroll p-3 space-y-3">
                        </div>
                </div>
                
                <div class="w-2/3 flex flex-col bg-white rounded-2xl border border-gray-200 p-8 shadow-sm relative">
                    <h4 id="promptEditorTitle" class="text-base font-black text-blue-600 mb-6 border-l-4 border-blue-500 pl-3">✨ 锻造新兵器</h4>
                    
                    <input id="modalPromptName" type="text" placeholder="兵器名称 (例如: 爆款小说大纲生成器)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-4 outline-none mb-4 text-base font-bold focus:border-blue-400 focus:bg-white transition-all">
                    
                    <textarea id="modalPromptContent" placeholder="在此注入您的核心系统指令，支持长篇复杂逻辑..." class="w-full flex-1 bg-gray-50 border border-gray-200 rounded-xl px-5 py-4 outline-none resize-none text-sm custom-scroll focus:border-blue-400 focus:bg-white transition-all leading-relaxed"></textarea>
                    
                    <div class="flex gap-4 mt-6">
                        <button id="savePromptBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg tracking-widest">保存入库</button>
                        <button id="resetPromptBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold py-4 px-8 rounded-xl transition-all">清空 / 新增</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GENE_PROMPT = `作为顶级编辑，请深度解构该文本并生成基因报告：1.叙事结构与情节逻辑；2.人物塑造；3.情感张力与写作技法；4.情绪链路与冲突密度；5.语言风格。`;
        let flowConfig = JSON.parse(localStorage.getItem('lingxi_flow')) || { ds_key:'', qw_key:'', db_key:'', proxy_url:'', proxy_key:'', proxy_models:'gpt-4o' };
        let prompts = JSON.parse(localStorage.getItem('lingxi_prompts')) || { "灵犀助手": "你是一个智慧创作助手。" };
        let history = JSON.parse(localStorage.getItem('lingxi_history')) || [];
        let sampleLibrary = JSON.parse(localStorage.getItem('lingxi_samples')) || [];
        
        let selectedSampleIndices = []; 
        let currentChatId = null; let isGenerating = false; let abortController = null;
        let editingOldPromptName = null;

        function init() { 
            updateSidebarPromptBadge(); 
            renderSelect(); 
            updateModelDropdowns(); 
            renderSampleLibrary(); 
            renderHistorySelect();
            Object.keys(flowConfig).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = flowConfig[id]; });
            document.getElementById('workspace').value = localStorage.getItem('lingxi_workspace') || '';
            setTheme(localStorage.getItem('lingxi_theme') || ''); 
        }

        // ==========================================
        // 核心管理：神兵武库
        // ==========================================
        function updateSidebarPromptBadge() {
            const count = Object.keys(prompts).length;
            document.getElementById('promptCountBadge').innerText = count + '件';
            document.getElementById('modalListCount').innerText = count;
        }

        function renderModalPromptList() {
            const list = document.getElementById('modalPromptList');
            list.innerHTML = '';
            Object.keys(prompts).forEach(name => {
                const item = document.createElement('div');
                item.className = "group bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center cursor-pointer hover:border-blue-400 hover:shadow-md transition-all";
                const titleSpan = document.createElement('span');
                titleSpan.className = "text-sm font-bold text-gray-700 truncate flex-1 pointer-events-none";
                titleSpan.innerText = name;
                
                const btnContainer = document.createElement('div');
                btnContainer.className = "flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity ml-2";
                
                const editBtn = document.createElement('button');
                editBtn.className = "text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-1.5 rounded-lg transition";
                editBtn.innerText = "✏️";
                editBtn.onclick = (e) => { e.stopPropagation(); loadPromptIntoEditor(name); };
                
                const delBtn = document.createElement('button');
                delBtn.className = "text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded-lg transition";
                delBtn.innerText = "🗑️";
                delBtn.onclick = (e) => { e.stopPropagation(); deletePrompt(name); };
                
                btnContainer.append(editBtn, delBtn);
                item.append(titleSpan, btnContainer);
                item.onclick = () => loadPromptIntoEditor(name);
                list.appendChild(item);
            });
            updateSidebarPromptBadge();
            renderSelect(); 
        }

        function loadPromptIntoEditor(name) {
            editingOldPromptName = name;
            document.getElementById('modalPromptName').value = name;
            document.getElementById('modalPromptContent').value = prompts[name];
            document.getElementById('promptEditorTitle').innerHTML = "✏️ 修改兵器";
            document.getElementById('savePromptBtn').innerText = "保存修改";
            document.getElementById('savePromptBtn').classList.replace('bg-blue-600', 'bg-amber-500'); 
            document.getElementById('savePromptBtn').classList.replace('hover:bg-blue-700', 'hover:bg-amber-600');
        }

        function resetPromptEditor() {
            editingOldPromptName = null;
            document.getElementById('modalPromptName').value = '';
            document.getElementById('modalPromptContent').value = '';
            document.getElementById('promptEditorTitle').innerHTML = "✨ 锻造新兵器";
            document.getElementById('savePromptBtn').innerText = "保存入库";
            document.getElementById('savePromptBtn').classList.replace('bg-amber-500', 'bg-blue-600');
            document.getElementById('savePromptBtn').classList.replace('hover:bg-amber-600', 'hover:bg-blue-700');
        }

        document.getElementById('savePromptBtn').onclick = () => {
            const newName = document.getElementById('modalPromptName').value.trim();
            const newContent = document.getElementById('modalPromptContent').value.trim();
            if(!newName || !newContent) { alert("名称和指令内容均不可为空！"); return; }
            if(editingOldPromptName && editingOldPromptName !== newName) { delete prompts[editingOldPromptName]; }
            prompts[newName] = newContent;
            localStorage.setItem('lingxi_prompts', JSON.stringify(prompts));
            showToast(`✨ 兵器【${newName}】保存成功`);
            resetPromptEditor();
            renderModalPromptList();
        };

        window.deletePrompt = function(name) {
            if(Object.keys(prompts).length <= 1) { alert("武库里至少要保留一把兵器防身哦！"); return; }
            if(confirm(`🚨 确认要销毁兵器【${name}】吗？不可恢复！`)) {
                delete prompts[name];
                localStorage.setItem('lingxi_prompts', JSON.stringify(prompts));
                if(editingOldPromptName === name) resetPromptEditor();
                renderModalPromptList();
            }
        };

        document.getElementById('openPromptModalBtn').onclick = () => {
            renderModalPromptList();
            resetPromptEditor();
            document.getElementById('promptModal').classList.remove('hidden');
        };
        document.getElementById('closePromptModal').onclick = () => document.getElementById('promptModal').classList.add('hidden');
        document.getElementById('resetPromptBtn').onclick = resetPromptEditor;

        function renderSelect() { 
            const s = document.getElementById('promptSelect'); 
            s.innerHTML = ''; 
            Object.keys(prompts).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`); 
        }

        // ==========================================
        // 原有功能集成区
        // ==========================================
        document.getElementById('themeToggle').onclick = (e) => { e.stopPropagation(); const m = document.getElementById('themeMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
        window.onclick = () => document.getElementById('themeMenu').style.display = 'none';
        window.setTheme = (t) => { document.body.className = 'h-screen flex overflow-hidden ' + t; localStorage.setItem('lingxi_theme', t); };

        document.getElementById('exportSystemBtn').onclick = () => {
            const systemData = { flowConfig, prompts, sampleLibrary, history, workspace: document.getElementById('workspace').value };
            const blob = new Blob([JSON.stringify(systemData, null, 2)], { type: "application/json;charset=utf-8" });
            saveAs(blob, `灵犀_神兵档案_${Date.now()}.json`);
        };
        
        document.getElementById('importSystemInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.flowConfig) { flowConfig = data.flowConfig; localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig)); }
                    if (data.prompts) { prompts = data.prompts; localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); }
                    if (data.sampleLibrary) { sampleLibrary = data.sampleLibrary; localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary)); }
                    if (data.history) { history = data.history; localStorage.setItem('lingxi_history', JSON.stringify(history)); }
                    if (data.workspace !== undefined) { document.getElementById('workspace').value = data.workspace; localStorage.setItem('lingxi_workspace', data.workspace); }
                    alert("✨ 档案读取成功！"); init();
                } catch (err) { alert("❌ 导入失败，档案损坏"); }
            };
            reader.readAsText(file); e.target.value = ''; 
        };

        setInterval(() => {
            localStorage.setItem('lingxi_auto_backup_snapshot', JSON.stringify({ flowConfig, prompts, sampleLibrary, history, workspace: document.getElementById('workspace').value, timestamp: new Date().toLocaleString() }));
            showToast(`✨ 自动存入本地快照`);
        }, 5 * 60 * 1000);

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-800/90 text-white px-6 py-2.5 rounded-full shadow-2xl z-[300] transition-opacity duration-700 text-xs font-bold backdrop-blur-sm border border-white/10";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; }, 2500);
            setTimeout(() => { toast.remove(); }, 3200);
        }

        window.restoreAutoBackup = function() {
            const snapshot = localStorage.getItem('lingxi_auto_backup_snapshot');
            if(!snapshot) { alert("无快照"); return; }
            if(confirm("覆盖当前数据？")) {
                const data = JSON.parse(snapshot);
                flowConfig=data.flowConfig; prompts=data.prompts; sampleLibrary=data.sampleLibrary; history=data.history; document.getElementById('workspace').value=data.workspace;
                localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig)); localStorage.setItem('lingxi_prompts', JSON.stringify(prompts)); localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary)); localStorage.setItem('lingxi_history', JSON.stringify(history)); localStorage.setItem('lingxi_workspace', data.workspace);
                init();
            }
        };

        document.getElementById('tempSlider').oninput = (e) => { document.getElementById('tempValueDisplay').innerText = e.target.value; };
        
        function renderHistorySelect() {
            const sel = document.getElementById('historySelect'); sel.innerHTML = '<option value="">-- 点击选择回溯 --</option>';
            history.slice().reverse().forEach(h => { sel.innerHTML += `<option value="${h.id}">${h.time} | ${h.title}</option>`; });
            sel.onchange = (e) => { const chat = history.find(h => h.id === e.target.value); if(chat) { currentChatId = chat.id; document.getElementById('displayArea').innerHTML = chat.content; } };
        }
        
        function renderSampleLibrary() {
            const container = document.getElementById('sampleLibrary'); container.innerHTML = '';
            sampleLibrary.forEach((s, i) => {
                const isSelected = selectedSampleIndices.includes(i);
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border text-[11px] transition-all flex flex-col gap-2 ${isSelected ? 'bg-blue-600/10 border-blue-500' : 'bg-white/5 border-white/5'}`;
                div.innerHTML = `<div class="flex items-center justify-between"><label class="flex items-center gap-2 cursor-pointer text-gray-300"><input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSample(${i})"><span class="truncate w-32 font-bold">${s.name}</span></label><div class="flex gap-2"><button onclick="extractGene(${i})" title="提取基因" class="text-blue-400 hover:text-white">🧬</button><button onclick="deleteSample(${i})" class="text-red-500/50 hover:text-red-400 text-lg leading-none">×</button></div></div>${s.gene ? `<div class="text-[9px] text-blue-300/60 bg-blue-500/10 p-2 rounded italic line-clamp-1">已分析基因</div>` : ''}`;
                container.appendChild(div);
            });
        }
        
        function toggleSample(idx) { if (selectedSampleIndices.includes(idx)) selectedSampleIndices = selectedSampleIndices.filter(i => i !== idx); else selectedSampleIndices.push(idx); renderSampleLibrary(); }
        
        async function extractGene(idx) {
            if (isGenerating) return; const aW = appendMsg('ai', `正在提取《${sampleLibrary[idx].name}》的创作基因...`);
            isGenerating = true; abortController = new AbortController();
            await streamCallAI(document.getElementById('singleModel').value, "基因提取专家", `${GENE_PROMPT}\n\n内容：${sampleLibrary[idx].text.slice(0, 5000)}`, aW.querySelector('.msg-body'), 0.3);
            sampleLibrary[idx].gene = aW.querySelector('.msg-body').innerText; localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary));
            isGenerating = false; renderSampleLibrary();
        }
        
        document.getElementById('sendBtn').onclick = async () => {
            if (isGenerating) { abortController.abort(); return; }
            const input = document.getElementById('userInput'); const text = input.value.trim(); if(!text) return;
            let combinedRef = ""; selectedSampleIndices.forEach(idx => { const s = sampleLibrary[idx]; combinedRef += `\n【参考基因/内容《${s.name}》】\n${s.gene || s.text.slice(0, 800)}\n`; });
            const finalFullPrompt = `### 参考风格 ###\n${combinedRef || "自由风格"}\n\n### 指令 ###\n${prompts[document.getElementById('promptSelect').value]}\n\n### 任务 ###\n${text}`;
            const isPKMode = !document.getElementById('pkSelectBox').classList.contains('hidden');
            isGenerating = true; document.getElementById('sendBtn').innerText = "停止"; abortController = new AbortController();
            if(isPKMode) {
                const mA = document.getElementById('modelA').value; const mB = document.getElementById('modelB').value;
                const pkGrid = document.createElement('div'); pkGrid.className = "pk-grid flex gap-4 w-full";
                const colA = createPKCol(mA); const colB = createPKCol(mB); pkGrid.append(colA, colB); document.getElementById('displayArea').appendChild(pkGrid);
                await Promise.all([ streamCallAI(mA, "仿写专家", finalFullPrompt, colA.querySelector('.pk-body'), parseFloat(document.getElementById('tempSlider').value)), streamCallAI(mB, "仿写专家", finalFullPrompt, colB.querySelector('.pk-body'), parseFloat(document.getElementById('tempSlider').value)) ]);
                addActions(colA.querySelector('.pk-body'), colA.querySelector('.pk-body').innerText); addActions(colB.querySelector('.pk-body'), colB.querySelector('.pk-body').innerText);
            } else {
                appendMsg('user', text); const aW = appendMsg('ai', "...");
                await streamCallAI(document.getElementById('singleModel').value, "仿写专家", finalFullPrompt, aW.querySelector('.msg-body'), parseFloat(document.getElementById('tempSlider').value));
                addActions(aW.querySelector('.ai-msg'), aW.querySelector('.msg-body').innerText);
            }
            isGenerating = false; document.getElementById('sendBtn').innerText = "开始执行"; input.value = ''; saveHistory(); renderHistorySelect();
        };

        async function streamCallAI(modelName, sys, text, targetElement, temp) {
            let apiUrl = ""; let apiKey = ""; 
            if (modelName.startsWith('ep-') || modelName.includes('doubao')) { apiUrl = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions'; apiKey = flowConfig.db_key; }
            else if (modelName === 'deepseek-chat') { apiUrl = "https://api.deepseek.com/v1/chat/completions"; apiKey = flowConfig.ds_key; }
            else if (modelName === 'qwen-plus') { apiUrl = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"; apiKey = flowConfig.qw_key; }
            else { apiUrl = flowConfig.proxy_url.trim().replace(/\/$/, '') + '/chat/completions'; apiKey = flowConfig.proxy_key; }
            try {
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey.trim()}` }, body: JSON.stringify({ model: modelName, messages: [{role:"system", content: sys}, {role:"user", content: text}], stream: true, temperature: temp }), signal: abortController.signal });
                const reader = response.body.getReader(); const decoder = new TextDecoder(); targetElement.innerText = '';
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    const chunk = decoder.decode(value); const lines = chunk.split('\n');
                    for (const line of lines) { if (line.trim().startsWith('data: ')) { 
                        const d = line.replace('data: ', '').trim(); if (d === '[DONE]') break; 
                        try { const j = JSON.parse(d); const c = j.choices[0].delta.content; if (c) { targetElement.innerText += c; targetElement.scrollTop = targetElement.scrollHeight; } } catch(e) {} 
                    } }
                }
            } catch (e) { targetElement.innerText += e.name === 'AbortError' ? "\n[已停止]" : "\n[错误]: " + e.message; }
        }

        function addActions(container, text) {
            const footer = document.createElement('div'); footer.className = 'flex gap-4 mt-4 border-t pt-2';
            const btnBack = document.createElement('button'); btnBack.className = 'text-[10px] font-black text-blue-500'; btnBack.innerText = '⬅️ 回填';
            btnBack.onclick = () => { document.getElementById('workspace').value += (document.getElementById('workspace').value ? '\n\n' : '') + text; localStorage.setItem('lingxi_workspace', document.getElementById('workspace').value); };
            const btnWord = document.createElement('button'); btnWord.className = 'text-[10px] font-black text-gray-400'; btnWord.innerText = '📄 Word';
            btnWord.onclick = () => { const doc = new docx.Document({ sections: [{ children: text.split('\n').map(l => new docx.Paragraph({ children: [new docx.TextRun({text:l, size:24})] })) }] }); docx.Packer.toBlob(doc).then(b => saveAs(b, `作品_${Date.now()}.docx`)); };
            footer.append(btnBack, btnWord); container.appendChild(footer);
        }

        document.getElementById('toggleSpace').onclick = function() { const isActive = document.getElementById('mainEditor').classList.toggle('editor-active'); this.innerText = isActive ? "📔 关闭空间" : "✍️ 分屏创作"; this.className = isActive ? "bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-black transition-all shadow-md" : "bg-gray-100 hover:bg-blue-50 text-blue-600 px-6 py-2 rounded-full text-sm font-black transition-all shadow-sm"; };
        document.getElementById('workspace').oninput = (e) => localStorage.setItem('lingxi_workspace', e.target.value);
        document.getElementById('modeChat').onclick = () => switchMode(false); document.getElementById('modePK').onclick = () => switchMode(true);
        function switchMode(pk) { document.getElementById('modeChat').className = pk ? "mode-btn text-gray-400" : "mode-btn mode-btn-active"; document.getElementById('modePK').className = !pk ? "mode-btn text-gray-400" : "mode-btn mode-btn-active"; document.getElementById('singleSelectBox').classList.toggle('hidden', pk); document.getElementById('pkSelectBox').classList.toggle('hidden', !pk); }
        function updateModelDropdowns() { const custom = flowConfig.proxy_models.split(/[,，]/).map(m => m.trim()).filter(m => m); const all = ['deepseek-chat', 'qwen-plus', ...custom]; ['singleModel', 'modelA', 'modelB'].forEach(id => { const el = document.getElementById(id); el.innerHTML = ''; all.forEach(m => el.innerHTML += `<option value="${m}">${m}</option>`); }); }
        document.getElementById('openSettings').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('saveSettings').onclick = () => { Object.keys(flowConfig).forEach(id => { if(document.getElementById(id)) flowConfig[id] = document.getElementById(id).value.trim(); }); localStorage.setItem('lingxi_flow', JSON.stringify(flowConfig)); updateModelDropdowns(); document.getElementById('settingsModal').classList.add('hidden'); showToast("⚙️ 大脑配置已保存"); };
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('newChatBtn').onclick = () => { currentChatId = null; document.getElementById('displayArea').innerHTML = ''; };
        document.getElementById('clearChatBtn').onclick = () => { if(confirm("确定清空当前屏幕内容吗？")) { document.getElementById('displayArea').innerHTML = ''; } };
        function deleteSample(i) { sampleLibrary.splice(i,1); localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary)); renderSampleLibrary(); }
        document.getElementById('fileInput').onchange = async (e) => { for (let file of e.target.files) { if (file.name.endsWith('.docx')) { let content = (await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()})).value; sampleLibrary.push({ name: file.name, text: content }); } else { const reader = new FileReader(); reader.onload = function() { sampleLibrary.push({ name: file.name, text: reader.result }); localStorage.setItem('lingxi_samples', JSON.stringify(sampleLibrary)); renderSampleLibrary(); }; reader.readAsText(file); } } };
        function appendMsg(s, t) { const c = document.getElementById('displayArea'); const w = document.createElement('div'); w.className = 'msg-wrapper ' + (s==='user'?'items-end':'items-start'); w.innerHTML = `<div class="${s}-msg"><div class="msg-body">${t}</div></div>`; c.appendChild(w); c.scrollTop = c.scrollHeight; return w; }
        function createPKCol(mName) { const col = document.createElement('div'); col.className = "pk-column shadow-xl flex-1 bg-white rounded-xl overflow-hidden border border-gray-100"; col.innerHTML = `<div class="pk-header bg-gray-50 font-bold p-3 border-b text-center text-sm text-gray-600">${mName}</div><div class="pk-body custom-scroll p-4 text-sm"></div>`; return col; }
        function saveHistory() { const content = document.getElementById('displayArea').innerHTML; if(!content.trim()) return; const now = new Date(); const timeStr = `${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`; if(!currentChatId) { currentChatId = Date.now().toString(); const title = document.querySelector('.user-msg')?.innerText.slice(0, 12) || "新创作"; history.push({ id: currentChatId, title, content, time: timeStr }); } else { const idx = history.findIndex(h => h.id === currentChatId); if(idx !== -1) { history[idx].content = content; history[idx].time = timeStr; } } localStorage.setItem('lingxi_history', JSON.stringify(history)); }

        init();
    </script>
</body>
